anchor_lookup:
  # Formato: anchor_string: [domain_path_1, domain_path_2, ...]
  # WHY: O(1) lookup vs O(n) scan da taxonomia completa
  # WHEN: skill_matcher.find_matches() consulta este índice primeiro

  compound_interest: [mathematics/financial-math/compound-interest]
  juros_compostos:   [mathematics/financial-math/compound-interest]
  VF: [mathematics/financial-math/compound-interest, finance/valuation]
  VP: [mathematics/financial-math/compound-interest, finance/valuation]
  SELIC: [mathematics/financial-math/compound-interest, legal/civil-law/contracts/financial-clauses]
  IGPM: [mathematics/financial-math/inflation-adjustment, legal/civil-law/contracts/financial-clauses]
  IPCA: [mathematics/financial-math/inflation-adjustment, legal/civil-law/contracts/financial-clauses]
  INPC: [mathematics/financial-math/inflation-adjustment]
  correcao_monetaria: [mathematics/financial-math/inflation-adjustment, legal/civil-law/contracts/financial-clauses]
  art_406_cc: [legal/civil-law/contracts/financial-clauses, legal/civil-law/obligations]
  inadimplemento: [legal/civil-law/obligations, legal/civil-law/contracts/financial-clauses]
  mora: [legal/civil-law/obligations]
  contrato: [legal/civil-law/contracts/financial-clauses, legal/civil-law/contracts]
  obrigacao: [legal/civil-law/obligations]
  ForgeSkills: [skills/apex_internals/forgeskills]
  dynamic_skill_forge: [skills/apex_internals/forgeskills]
  attraction_engine: [skills/apex_internals/cognitive-modes]
  gradient: [algorithms/optimization/gradient-descent, skills/mathematics/calculus/optimization]
  algorithm: [skills/engineering/software/algorithms]
  architecture: [skills/engineering/software/architecture, agents/architect]
  bayesian: [skills/mathematics/statistics/bayesian, agents/bayesian_curator]
  pmi: [agents/pmi_pm, skills/business/project-management]

# ─────────────────────────────────────────────────────────────────
# Cross-Domain Bridges (Pré-definidos)
# ─────────────────────────────────────────────────────────────────
cross_domain_bridges:
  # WHY: Bridges pré-definidos garantem que domains que DEVEM atrair-se o façam
  #      mesmo antes das skills serem carregadas como SKILL.md do superrepo.
  # Aplicados pelo attraction_engine (OPP-107).

  - id: BD-001
    source_domain: legal.civil_law.obligations
    target_domain: mathematics.financial_math.compound_interest
    strength: 0.85
    trigger_anchors: [inadimplemento, mora, art_406_cc, juros_legais]
    reason: "Art. 406 CC define juros legais = SELIC (capitalização composta mensal)"
    formula_reference: "VF = VP × (1 + i_SELIC/12)^n_meses"

  - id: BD-002
    source_domain: legal.civil_law.contracts.financial_clauses
    target_domain: mathematics.financial_math.inflation_adjustment
    strength: 0.95
    trigger_anchors: [IGPM, IPCA, reajuste, correcao_monetaria]
    reason: "Cláusula de reajuste monetário = cálculo de variação de índice inflacionário"
    formula_reference: "fator = indice_final / indice_base"

  - id: BD-003
    source_domain: legal.civil_law.contracts.financial_clauses
    target_domain: mathematics.financial_math.compound_interest
    strength: 0.90
    trigger_anchors: [art_406_cc, juros_legais, taxa_contratual, mora_contratual]
    reason: "Juros legais em contratos civis = SELIC em capitalização composta"

  - id: BD-004
    source_domain: business.project_management.risk
    target_domain: mathematics.statistics.bayesian
    strength: 0.75
    trigger_anchors: [FMEA, risco, probabilidade, impacto, mitigacao]
    reason: "FMEA usa probabilidade de falha e impacto — modelo bayesiano de risco"

  - id: BD-005
    source_domain: engineering.software.algorithms
    target_domain: mathematics.calculus.optimization
    strength: 0.65
    trigger_anchors: [gradient_descent, backpropagation, loss_function, convergencia]
    reason: "Otimização de algoritmos ML usa gradiente descendente e derivadas"

  - id: BD-006
    source_domain: finance.valuation.DCF
    target_domain: mathematics.financial_math.compound_interest
    strength: 0.85
    trigger_anchors: [DCF, WACC, desconto, fluxo_caixa, valor_presente]
    reason: "DCF usa taxa de desconto composta — VPL = Σ FC_t / (1+WACC)^t"

  - id: BD-007
    source_domain: legal.consumer_law.damages
    target_domain: mathematics.statistics.inference
    strength: 0.70
    trigger_anchors: [dano_moral, indenizacao, probabilidade, precedentes]
    reason: "Cálculo de dano moral considera probabilidade de dano e precedentes jurisprudenciais"