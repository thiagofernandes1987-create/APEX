# APEX Global Anchor Registry
# WHY: Taxonomia centralizada de âncoras — usado pelo skill_matcher para busca O(1)
#      e pelo attraction_engine para calcular overlap entre skills.
# WHEN: Lido no STEP_0 via ForgeSkills boot (OPP-106). Consultado em cada busca de skill.
# HOW: Índice flat anchor→domain_paths para lookup rápido. Grupos temáticos para navegação.
# WHAT_IF_FAILS: Se indisponível, attraction_engine usa apenas anchors locais das skills.

version: v00.33.0
last_updated: "2026-04-08"
total_anchors: 142  # Expandido via skills do apex_superrepo

