  # ============================================================
  # OPP-132: security_logger — Logger estruturado com redação de PII
  # ============================================================
  - opp_id: OPP-132
    name: security_logger
    title: "Logger estruturado com redação automática de PII para módulos APEX"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: false
    type: security
    executor_type: SANDBOX_CODE

    why: >
      Audit identificou que módulos APEX não têm padrão unificado de logging.
      Sem redação de PII, qualquer log que inclua resposta de API, query de banco ou
      input de usuário pode vazar dados pessoais (CPF, email, telefone, nome) no contexto
      do LLM. Este OPP adiciona um logger padrão com redação automática de padrões PII.

    when: >
      Importado por qualquer módulo APEX que faça logging de operações.
      Obrigatório em módulos com data_access: restricted ou full.

    how:
      changes:
        - section: modules.security_logger
          change_type: add
          description: "Novo módulo com ApexLogger + redação automática de PII"

    implementation:
      code: |
        # WHY: Logger padrão APEX com redação automática de PII
        # WHEN: Importado por qualquer módulo que faça logging
        # HOW: Wrapper sobre print/logging com regex de redação aplicada antes de qualquer saída
        # WHAT_IF_FAILS: Fallback para print simples com aviso de redação indisponível
        # SECURITY_LEVEL: HIGH — falha aqui = vazamento de dados pessoais

        import re
        import json
        from datetime import datetime
        from typing import Any, Optional

        # Padrões PII para redação — ordem importa (mais específico primeiro)
        _PII_PATTERNS = [
            # CPF brasileiro: 000.000.000-00 ou 00000000000
            (re.compile(r'\b\d{3}\.?\d{3}\.?\d{3}-?\d{2}\b'), '[CPF_REDACTED]'),
            # Email
            (re.compile(r'\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Z|a-z]{2,}\b'), '[EMAIL_REDACTED]'),
            # Telefone BR: (11) 99999-9999 ou +55 11 99999-9999
            (re.compile(r'(\+55\s?)?(\(?\d{2}\)?\s?)(\d{4,5}[\-\s]?\d{4})'), '[PHONE_REDACTED]'),
            # Token/API key: strings hexadecimais longas ou base64
            (re.compile(r'\b[A-Za-z0-9]{32,}\b'), '[TOKEN_REDACTED]'),
            # Bearer tokens
            (re.compile(r'Bearer\s+[A-Za-z0-9\-._~+/]+=*', re.IGNORECASE), 'Bearer [TOKEN_REDACTED]'),
            # Cartão de crédito: 16 dígitos (com ou sem espaço/hífen)
            (re.compile(r'\b\d{4}[\s\-]?\d{4}[\s\-]?\d{4}[\s\-]?\d{4}\b'), '[CARD_REDACTED]'),
        ]

        # Campos que nunca devem aparecer em logs
        _BLOCKED_KEYS = frozenset([
            'password', 'senha', 'secret', 'token', 'api_key', 'apikey',
            'authorization', 'credential', 'private_key', 'access_token',
            'refresh_token', 'client_secret'
        ])


        def _redact_string(text: str) -> str:
            """
            WHY: Remover PII de strings antes de qualquer saída de log.
            WHEN: Chamado em toda mensagem de log antes de escrever.
            HOW: Aplicar regex patterns em sequência.
            WHAT_IF_FAILS: Retornar '[REDACTION_FAILED: conteúdo suprimido]'
            """
            if not isinstance(text, str):
                return str(text)
            try:
                for pattern, replacement in _PII_PATTERNS:
                    text = pattern.sub(replacement, text)
                return text
            except Exception:
                return '[REDACTION_FAILED: conteúdo suprimido por segurança]'


        def _redact_dict(data: dict, depth: int = 0) -> dict:
            """
            WHY: Redação recursiva em dicts — APIs retornam estruturas aninhadas.
            WHEN: Chamado em log de responses de API ou dados estruturados.
            HOW: Recursivo até depth=5 (evitar loop infinito em estruturas circulares).
            WHAT_IF_FAILS: Retornar {'status': 'REDACTION_ERROR'} — nunca expor dados.
            """
            if depth > 5:
                return {'_truncated': 'max_depth_reached'}
            try:
                result = {}
                for key, value in data.items():
                    # Bloquear campos sensíveis por nome
                    if str(key).lower() in _BLOCKED_KEYS:
                        result[key] = '[BLOCKED_KEY_REDACTED]'
                    elif isinstance(value, dict):
                        result[key] = _redact_dict(value, depth + 1)
                    elif isinstance(value, list):
                        result[key] = [_redact_dict(v, depth + 1) if isinstance(v, dict)
                                       else _redact_string(str(v)) for v in value]
                    elif isinstance(value, str):
                        result[key] = _redact_string(value)
                    else:
                        result[key] = value
                return result
            except Exception:
                return {'_error': 'REDACTION_ERROR — conteúdo suprimido'}


        class ApexLogger:
            """
            WHY: Logger unificado APEX com redação automática de PII.
            WHEN: Usar em qualquer módulo APEX que faça logging de operações.
            HOW: Wrapper sobre print com timestamp, nível e redação obrigatória.
            WHAT_IF_FAILS: Fallback para print simples se logger falhar.
            SECURITY_LEVEL: HIGH
            """

            def __init__(self, module_id: str, data_access: str = 'none'):
                """
                Args:
                    module_id: Identificador do módulo (ex: 'forgeskills.boot')
                    data_access: 'none' | 'restricted' | 'full'
                                 Se 'full', redação é mais agressiva.
                """
                self.module_id = module_id
                self.data_access = data_access
                self._extra_redaction = data_access in ('restricted', 'full')

            def _format(self, level: str, message: str, data: Optional[Any] = None) -> str:
                ts = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
                safe_msg = _redact_string(message)
                entry = {
                    'ts': ts,
                    'level': level,
                    'module': self.module_id,
                    'msg': safe_msg
                }
                if data is not None:
                    if isinstance(data, dict):
                        entry['data'] = _redact_dict(data)
                    else:
                        entry['data'] = _redact_string(str(data))
                try:
                    return json.dumps(entry, ensure_ascii=False)
                except Exception:
                    return f'{ts} [{level}] {self.module_id}: {safe_msg}'

            def info(self, message: str, data: Optional[Any] = None):
                print(self._format('INFO', message, data))

            def warn(self, message: str, data: Optional[Any] = None):
                print(self._format('WARN', message, data))

            def error(self, message: str, data: Optional[Any] = None):
                print(self._format('ERROR', message, data))

            def security(self, event: str, data: Optional[Any] = None):
                """Para eventos de segurança — sempre logados, independente de nível."""
                print(self._format('SECURITY', f'[SECURITY_EVENT] {event}', data))


        # Instância padrão para módulos que não precisam de configuração
        apex_log = ApexLogger(module_id='apex.default', data_access='none')

    impacts:
      modules_added: [security_logger]
      breaking_changes: false

    what_if_fails:
      - mode: "regex PII não captura variação regional de CPF/telefone"
        probability: 5
        severity: 5
        detection: 4
        rpn: 100
        mitigation: "Padrões incluem variações com/sem pontuação. Adicionar padrões via OPP de patch."
        fallback: "Módulos com data_access=full têm redação mais agressiva como fallback"
      - mode: "TOKEN_REDACTED destrói hashes SHA-256 legítimos em logs"
        probability: 6
        severity: 3
        detection: 3
        rpn: 54
        mitigation: "Logs de hash usam chave 'hash_check' — não passa pelo filtro de token"
        fallback: "Se hash aparece em campo suspeito, redação é comportamento correto"
      - mode: "Estrutura circular em dict causa recursão infinita"
        probability: 2
        severity: 6
        detection: 3
        rpn: 36
        mitigation: "depth limit=5 em _redact_dict previne stack overflow"
        fallback: "depth>5 retorna {'_truncated': 'max_depth_reached'} — nunca falha silencioso"
      - mode: "json.dumps falha em objeto não-serializável"
        probability: 3
        severity: 2
        detection: 2
        rpn: 12
        mitigation: "except em _format retorna fallback string simples"
        fallback: "Log degradado mas não quebrado — mensagem ainda aparece"

    fmea:
      total_rpn: 202
      risk_level: MEDIUM
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover módulo security_logger. Módulos que o importam voltam a usar print() direto."

    depends_on: []
    conflicts_with: []

