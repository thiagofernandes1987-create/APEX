  # ============================================================
  # OPP-125: SR_42 — Integridade SHA-256 para trusted_domains
  # ============================================================
  - opp_id: OPP-125
    name: sr42_trusted_domain_integrity
    title: "SR_42 — SHA-256 integrity gate para trusted_domains"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: true
    type: security
    executor_type: HYBRID

    why: >
      Audit identificou que trusted_domains valida apenas URL mas não integridade do conteúdo.
      Um repositório whitelistado pode ser comprometido (supply chain attack) e o APEX
      executaria código malicioso sem detecção. OPP-104 adicionou a whitelist; este OPP
      adiciona a segunda linha de defesa: hash de integridade por arquivo.

    when: >
      Ativado em ForgeSkills.fetch() antes de parsear qualquer SKILL.md ou código clonado
      de repositório externo. Não aplicado a recursos internos do prompt.

    how:
      description: >
        Adicionar SR_42 como regra inviolável no kernel. Implementar hash_registry em
        apex_runtime_probe para armazenar SHA-256 esperados dos arquivos do repositório
        canônico. ForgeSkills verifica hash antes de exec/importlib. Mismatch = BLOQUEAR.
      changes:
        - section: kernel.inviolable_rules
          change_type: add
          description: "SR_42: trusted_domain integrity check via SHA-256"
        - section: forgeskills_true_autoboot
          change_type: modify
          description: "Adicionar verificação de hash pós-fetch antes de registrar skill"
        - section: apex_runtime_probe
          change_type: modify
          description: "Adicionar hash_registry dict com SHA-256 esperados dos arquivos core"

    implementation:
      sr_42_rule: |
        SR_42 — TRUSTED_DOMAIN_INTEGRITY (inviolável)
        Todo arquivo clonado de trusted_domain deve ter SHA-256 verificado contra
        hash_registry antes de exec, importlib ou registro como ACTIVE.
        Mismatch → BLOQUEAR execução, registrar [SECURITY_ALERT: HASH_MISMATCH].
        Hash ausente no registry → registrar como PROVISIONAL, não como ACTIVE.

      forgeskills_hash_check: |
        # WHY: Verificar integridade antes de executar código externo
        # WHEN: Após urllib.request.urlopen() ou git clone, antes de qualquer uso
        # HOW: SHA-256 do conteúdo comparado com hash_registry
        # WHAT_IF_FAILS: BLOQUEAR — nunca executar código com hash inválido

        import hashlib

        def verify_integrity(content: bytes, expected_sha256: str) -> bool:
            """
            WHY: Detectar comprometimento de repositório externo.
            WHEN: Chamado em ForgeSkills após cada fetch, antes de registrar skill.
            HOW: SHA-256 do conteúdo bytes vs hash esperado no registry.
            WHAT_IF_FAILS: Retornar False — caller deve bloquear execução.
            """
            if not expected_sha256:
                # WHY: Hash ausente = arquivo não catalogado = não confiável
                return False  # Registrar como PROVISIONAL
            try:
                actual = hashlib.sha256(content).hexdigest()
                return actual == expected_sha256
            except Exception:
                return False  # Falha de verificação = não confiável

        def forge_skill_with_integrity(url: str, hash_registry: dict) -> dict:
            """
            WHY: Wraps ForgeSkills fetch com verificação obrigatória de integridade.
            WHEN: Substitui chamada direta de urllib em ForgeSkills boot.
            HOW: Fetch → hash → verify → parsear OU bloquear.
            WHAT_IF_FAILS: Retornar dict de erro [SECURITY_ALERT] — nunca silencioso.
            """
            import urllib.request

            try:
                with urllib.request.urlopen(url, timeout=10) as r:
                    content = r.read()
            except Exception as e:
                return {"status": "ERROR", "reason": f"Fetch falhou: {e}",
                        "nota": "[ERROR: FORGESKILLS_FETCH_FAILED]"}

            expected_hash = hash_registry.get(url, "")
            if not verify_integrity(content, expected_hash):
                if not expected_hash:
                    status = "PROVISIONAL"
                    nota = "[SECURITY_NOTICE: hash não cadastrado — skill registrada como PROVISIONAL]"
                else:
                    return {
                        "status": "BLOCKED",
                        "reason": "SHA-256 mismatch — possível comprometimento",
                        "url": url,
                        "nota": "[SECURITY_ALERT: HASH_MISMATCH]"
                    }
            else:
                status = "OK"
                nota = "[INTEGRITY_VERIFIED]"

            return {
                "status": status,
                "content": content.decode("utf-8"),
                "nota": nota
            }

    impacts:
      modules_added: [sr42_integrity_checker]
      modules_modified: [forgeskills_true_autoboot, apex_runtime_probe, kernel.inviolable_rules]
      rules_added: [SR_42]
      breaking_changes: false

    what_if_fails:
      - mode: "hash_registry vazio — todas as skills ficam PROVISIONAL"
        probability: 6
        severity: 5
        detection: 2
        rpn: 60
        mitigation: "Popular hash_registry com hashes dos arquivos core no boot"
        fallback: "Skills PROVISIONAL são carregadas mas marcadas — usuário avisado"
      - mode: "SHA-256 falso no registry — skill maliciosa passa"
        probability: 2
        severity: 9
        detection: 7
        rpn: 126
        mitigation: "Registry deve ser parte do prompt assinado, não fetchável externamente"
        fallback: "Audit periódico manual do hash_registry"
      - mode: "hashlib indisponível (runtime exótico)"
        probability: 1
        severity: 8
        detection: 3
        rpn: 24
        mitigation: "hashlib é stdlib Python universal — indisponibilidade indica runtime corrompido"
        fallback: "Bloquear tudo com nota [SECURITY: hashlib unavailable]"
      - mode: "Fork do repositório passa hash diferente"
        probability: 3
        severity: 6
        detection: 3
        rpn: 54
        mitigation: "trusted_domains só inclui URL canônica, não forks"
        fallback: "Fork detectado como HASH_MISMATCH → PROVISIONAL"

    fmea:
      total_rpn: 264
      risk_level: MEDIUM
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover SR_42 de inviolable_rules. Reverter forgeskills_true_autoboot para versão OPP-124. ForgeSkills volta a funcionar sem verificação de hash."

    depends_on: [OPP-124, OPP-119]
    conflicts_with: []

  # ============================================================
  # OPP-126: SR_43 — Gate de Aprovação por Contexto Crítico
  # ============================================================
  - opp_id: OPP-126
    name: sr43_approval_gate_by_context
    title: "SR_43 — approval_required obrigatório para mudanças em contexto crítico"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: true
    type: security
    executor_type: LLM_BEHAVIOR

    why: >
      Audit identificou OPPs com approval_required: false que modificavam trusted_domains
      e security policies. Isto cria vetor de corrupção silenciosa do prompt — mudanças
      críticas sem gate humano. SR_43 formaliza a regra implícita H5 ("nunca auto-aplicar
      DIFFs") em uma regra estrutural verificável por automação.

    when: >
      Avaliado no momento de criação de qualquer OPP. Validado automaticamente pelo
      SkillQualityBar do processo de aprovação. Violação = OPP rejeitado automaticamente.

    how:
      description: >
        Definir lista de contextos críticos onde approval_required: true é obrigatório.
        Adicionar verificação no OPPQualityBar. Qualquer OPP que modifique contexto crítico
        com approval_required: false é automaticamente marcado REJECTED.
      changes:
        - section: kernel.inviolable_rules
          change_type: add
          description: "SR_43: approval gate obrigatório para contextos críticos"
        - section: opp_quality_bar
          change_type: modify
          description: "Adicionar verificação SR_43 no gate de validação"

    implementation:
      sr_43_rule: |
        SR_43 — APPROVAL_GATE_BY_CONTEXT (inviolável)
        approval_required: true é OBRIGATÓRIO para qualquer OPP que modifique:
          - kernel.inviolable_rules (SR_*, H_*, C_*, G_*)
          - trusted_domains (qualquer adição ou remoção)
          - security.mitigation policies
          - executor_permissions (o que cada tipo pode fazer)
          - opp_quality_bar (critérios de aprovação)
        Violação automática → OPP status: REJECTED com reason: SR_43_VIOLATION.

      critical_contexts:
        - kernel.inviolable_rules
        - trusted_domains
        - security.mitigation
        - executor_permissions
        - opp_quality_bar
        - forgeskills_true_autoboot
        - apex_runtime_probe

    impacts:
      modules_added: [sr43_approval_validator]
      modules_modified: [kernel.inviolable_rules, opp_quality_bar]
      rules_added: [SR_43]
      breaking_changes: false

    what_if_fails:
      - mode: "Validador não detecta modificação indireta de contexto crítico"
        probability: 4
        severity: 7
        detection: 5
        rpn: 140
        mitigation: "Validador usa AST diff para detectar mudanças, não apenas campo 'target'"
        fallback: "Revisão humana obrigatória para qualquer OPP marcado HYBRID ou SANDBOX_CODE"
      - mode: "Usuário bypassa com approval_required: true mas sem revisão real"
        probability: 5
        severity: 6
        detection: 6
        rpn: 180
        mitigation: "SR_43 valida campo, não garante qualidade da revisão — responsabilidade do operador"
        fallback: "Audit log de todos os OPPs aprovados"
      - mode: "Lista de contextos críticos incompleta"
        probability: 4
        severity: 5
        detection: 4
        rpn: 80
        mitigation: "Lista é extensível — qualquer adição requer OPP com SR_43"
        fallback: "Princípio conservador: em dúvida, marcar como crítico"

    fmea:
      total_rpn: 400
      risk_level: MEDIUM
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover SR_43 de inviolable_rules. OPPs voltam a poder ter approval_required: false em qualquer contexto."

    depends_on: []
    conflicts_with: []

  # ============================================================
  # OPP-127: SR_44 — FMEA Completeness Gate
  # ============================================================
  - opp_id: OPP-127
    name: sr44_fmea_completeness_gate
    title: "SR_44 — Mínimo de modos de falha por tipo de OPP"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: true
    type: security
    executor_type: LLM_BEHAVIOR

    why: >
      Audit encontrou OPPs com what_if_fails contendo apenas 1 modo de falha trivial
      ("se falhar, não aplicar"). FMEA incompleto é equivalente a nenhum FMEA — o único
      valor é criar ilusão de governança sem sua substância. SR_44 impõe mínimos verificáveis.

    when: >
      Validado no OPPQualityBar. OPP que não atinge mínimo = REJECTED automaticamente.

    how:
      changes:
        - section: kernel.inviolable_rules
          change_type: add
          description: "SR_44: mínimo de modos de falha por tipo"

    implementation:
      sr_44_rule: |
        SR_44 — FMEA_COMPLETENESS_GATE (inviolável)
        Mínimo de modos de falha em what_if_fails por tipo de OPP:
          - executor_type: SANDBOX_CODE → mínimo 3 modos
          - executor_type: HYBRID → mínimo 3 modos
          - type: security → mínimo 4 modos (independente de executor_type)
          - type: feature com breaking_changes: true → mínimo 3 modos
          - Demais → mínimo 2 modos
        Modo trivial ("se falhar, não aplicar") não conta como modo válido.
        Modo sem mitigation ou fallback não conta como modo válido.

    impacts:
      modules_modified: [kernel.inviolable_rules, opp_quality_bar]
      rules_added: [SR_44]
      breaking_changes: false

    what_if_fails:
      - mode: "OPPs legítimos rejeitados por FMEA incompleto"
        probability: 5
        severity: 3
        detection: 2
        rpn: 30
        mitigation: "Mensagem de rejeição inclui lista exata do que está faltando"
        fallback: "Autor completa FMEA e resubmete — não requer aprovação adicional se só FMEA mudou"
      - mode: "Autores adicionam modos de falha fictícios para passar o gate"
        probability: 4
        severity: 5
        detection: 6
        rpn: 120
        mitigation: "Revisor humano valida se modos são plausíveis"
        fallback: "FMEA de baixa qualidade é melhor que nenhum — revisão posterior"

    fmea:
      total_rpn: 150
      risk_level: LOW
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover SR_44 de inviolable_rules. OPPs voltam a aceitar qualquer número de modos."

    depends_on: []
    conflicts_with: []

  # ============================================================
  # OPP-128: SR_45 — Ghost Dependency Blocker
  # ============================================================
  - opp_id: OPP-128
    name: sr45_ghost_dependency_blocker
    title: "SR_45 — depends_on com módulo indefinido bloqueia aprovação de OPP"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: true
    type: fix
    executor_type: HYBRID

    why: >
      Audit encontrou 13 ghost dependencies no v00.34.0 (módulos referenciados em
      depends_on que não existiam). OPP-121 corrigiu 7 delas. SR_45 previne reincidência
      formalizando que OPP com depends_on inválido não pode ser aprovado. A causa raiz é
      que dependências eram adicionadas sem verificação de existência.

    when: >
      Validado no OPPQualityBar no momento de aprovação. Verificado por apex_runtime_probe
      na inicialização (critical_missing: set() deve estar vazio).

    how:
      changes:
        - section: kernel.inviolable_rules
          change_type: add
          description: "SR_45: ghost dependency blocker"
        - section: apex_runtime_probe
          change_type: modify
          description: "Adicionar verificação de ghost dependencies no boot"

    implementation:
      sr_45_rule: |
        SR_45 — GHOST_DEPENDENCY_BLOCKER (inviolável)
        Nenhum OPP pode ser aprovado se qualquer módulo em depends_on não existir
        no prompt master_full OU no repositório canônico OU no APEX_SKILL_REGISTRY.
        Verificação é feita em aprovação (OPPQualityBar) E em boot (apex_runtime_probe).
        critical_missing: set() deve estar vazio para que status: FULLY_OPERATIONAL.

      ghost_dependency_check: |
        # WHY: Detectar depends_on referenciando módulos inexistentes antes de aprovação
        # WHEN: Chamado no OPPQualityBar e no apex_runtime_probe boot
        # HOW: grep de cada item em depends_on contra lista de módulos definidos
        # WHAT_IF_FAILS: OPP rejeitado com lista de dependências fantasma

        def check_ghost_dependencies(depends_on: list, defined_modules: set) -> dict:
            """
            WHY: Prevenir OPPs com dependências para módulos inexistentes.
            WHEN: Validação de OPP antes de aprovação.
            HOW: Set difference entre depends_on e defined_modules.
            WHAT_IF_FAILS: Retornar lista de ghosts — caller bloqueia aprovação.
            """
            if not depends_on:
                return {"status": "OK", "ghosts": []}

            ghosts = [d for d in depends_on if d not in defined_modules]
            if ghosts:
                return {
                    "status": "BLOCKED",
                    "ghosts": ghosts,
                    "action": f"Definir módulos {ghosts} antes de aprovar este OPP",
                    "nota": "[SR_45_VIOLATION: GHOST_DEPENDENCIES_DETECTED]"
                }
            return {"status": "OK", "ghosts": []}

    impacts:
      modules_modified: [kernel.inviolable_rules, apex_runtime_probe, opp_quality_bar]
      rules_added: [SR_45]
      breaking_changes: false

    what_if_fails:
      - mode: "depends_on referencia módulo que existe mas com nome diferente"
        probability: 5
        severity: 4
        detection: 3
        rpn: 60
        mitigation: "Checador usa fuzzy match com threshold 0.85 para sugerir nomes similares"
        fallback: "Mensagem de erro inclui sugestão do módulo mais similar"
      - mode: "Módulo existe no repo mas não está no prompt — falso positivo"
        probability: 4
        severity: 3
        detection: 3
        rpn: 36
        mitigation: "Checador verifica prompt E repo. Módulo no repo = não é ghost."
        fallback: "OPP marcado como 'repo_only_dependency' — aceito com aviso"
      - mode: "defined_modules list desatualizada no boot"
        probability: 3
        severity: 5
        detection: 4
        rpn: 60
        mitigation: "apex_runtime_probe recalcula defined_modules em cada boot, não usa cache"
        fallback: "Se recálculo falhar → usar snapshot da última sessão com aviso"

    fmea:
      total_rpn: 156
      risk_level: LOW
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover SR_45 de inviolable_rules. depends_on volta a aceitar qualquer valor sem verificação."

    depends_on: [OPP-121, OPP-119]
    conflicts_with: []

  # ============================================================
  # OPP-129: Normalização de Agentes Community
  # ============================================================
  - opp_id: OPP-129
    name: community_agent_normalization
    title: "Normalização de campos obrigatórios em 8 agentes community"
    version_target: v00.36.0
    status: PROPOSED
    approval_required: false
    type: fix
    executor_type: LLM_BEHAVIOR

    why: >
      Audit encontrou que os 8 agentes community (community_security_code_reviewer,
      community_data_analyst, etc.) carecem de: position_in_pipeline, depends_on,
      rule_reference, activates_in, anchors. Sem esses campos, o runtime trata agentes
      de qualidade muito diferente como equivalentes a agentes CORE, criando comportamento
      não-determinístico no pipeline.

    when: >
      Aplicado aos 8 agentes community no repositório. Não afeta agentes CORE.

    how:
      description: >
        Adicionar campos mínimos faltantes em cada agente community:
        position_in_pipeline, activates_in, anchors (≥6), rule_reference, depends_on.
        Alterar tier de CORE para COMMUNITY onde aplicável.
      changes:
        - section: agents/community_*
          change_type: modify
          description: "Adicionar campos obrigatórios faltantes em todos os 8 agentes community"

    implementation:
      fields_to_add: |
        # Para cada agente community, adicionar no frontmatter:
        tier: COMMUNITY                    # Distingue de CORE
        position_in_pipeline: STEP_3       # Community agents: executores de domínio
        activates_in: [FAST, DEEP, RESEARCH]  # Não em EXPRESS
        rule_reference: [SR_40]            # Regra mínima aplicável
        depends_on: [pmi_pm, architect]    # Sempre após scoping e design
        fallback_agent: null               # Declarar explicitamente se não houver
        failure_modes:
          - condition: "input fora do domínio do agente"
            action: "Retornar handoff para agente de domínio correto"
            escalation: "pmi_pm para re-scoping"

      normalization_note: |
        NOTA: Agentes community mantêm suas capacidades específicas (tools, model, etc.)
        da origem. A normalização adiciona SOMENTE os campos de governança APEX faltantes.
        Não altera comportamento — apenas adiciona rastreabilidade e posicionamento.

    impacts:
      modules_modified: [agents/community_*]
      breaking_changes: false

    what_if_fails:
      - mode: "Campo adicionado conflita com campo da origem do agente"
        probability: 3
        severity: 4
        detection: 2
        rpn: 24
        mitigation: "Revisar cada agente individualmente antes de aplicar"
        fallback: "Campo APEX tem precedência — campo de origem é comentado"
      - mode: "position_in_pipeline errado causa sequenciamento incorreto"
        probability: 4
        severity: 6
        detection: 3
        rpn: 72
        mitigation: "STEP_3 é conservador — executores de domínio raramente precisam ser antes"
        fallback: "Agente com position_in_pipeline errado pode ser corrigido por OPP de patch"

    fmea:
      total_rpn: 96
      risk_level: LOW
      gate: PASS

    rollback:
      feasible: true
      procedure: "Remover campos adicionados de cada agente community. Retornar ao schema original."

    depends_on: []
    conflicts_with: []

