# ─────────────────────────────────────────────────────────────────
# DIFF_SEQUENTIAL_THINKING_001 (OPP-103)
# Prioridade: P2 | Esforço: LOW | RPN: 4
# ─────────────────────────────────────────────────────────────────
sequential_thinking_module:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-103
  tier: 2
  status: PROPOSED

  purpose: >
    Integrar o Sequential Thinking MCP Server como módulo de raciocínio
    estruturado para modos DEEP e RESEARCH. Complementa o HypothesisDAG
    (que rastreia dependências) com capacidade de exploração passo-a-passo
    com revisão e branching formal — base do "pensamento realmente estruturado".

  why: >
    O HypothesisDAG do APEX rastreia DEPENDÊNCIAS entre hipóteses mas não
    guia o processo de EXPLORAÇÃO. O Sequential Thinking Server fornece
    exatamente isso: each thought tem thoughtNumber/totalThoughts/isRevision/
    branchFromThought — possibilitando "ir atrás" e revisar premissas sem
    perder o fio do raciocínio. Diferente do MCFE que executa N agentes
    em paralelo, o sequential thinking executa UM raciocínio linear mas
    com capacidade formal de revisão e bifurcação. Os dois são complementares.

  description: >
    O QUE É: Wrapper do Sequential Thinking MCP tool chamado via mcp_bridge_v2.
    O QUE NÃO É: Substituto do MCFE ou HypothesisDAG — é complemento.
    QUANDO USAR:
      - Problema com estrutura sequencial clara (algoritmos, provas matemáticas)
      - Necessidade de revisão formal de premissas anteriores
      - Exploração de múltiplos "galhos" de raciocínio sem perder contexto
      - DEEP/RESEARCH mode em problemas com dependências temporais
    INTEGRAÇÃO COM APEX:
      - Cada "thought" registrado como nó no HypothesisDAG
      - isRevision=true → invalidate_cascade() no DAG
      - branchFromThought → add_edge() no DAG com type="BRANCH"
      - totalThoughts estimado pelo BDE (Behavioral Difficulty Estimator)

  what_if_fails: >
    FALLBACK: Sequential Thinking MCP não disponível → raciocínio APEX normal.
    Declarar [SEQUENTIAL_THINKING_UNAVAILABLE]. Pipeline não interrompido.

  inject_when: "cognitive_mode IN [DEEP, RESEARCH] AND problem_has_sequential_structure"
  depends_on: [mcp_bridge_v2, hypothesis_dag, behavioral_difficulty_estimator]

  integration_protocol: |
    # Em STEP_3 (DEEP mode) quando problema tem estrutura sequencial:
    total_thoughts = behavioral_difficulty_estimator.estimate_steps(problem)

    for step_n in range(1, total_thoughts + 1):
        thought_result = mcp_bridge.call_tool(
            "sequentialthinking",
            "sequential_thinking",
            {
                "thought": f"[step {step_n}/{total_thoughts}] {current_thought}",
                "nextThoughtNeeded": step_n < total_thoughts,
                "thoughtNumber": step_n,
                "totalThoughts": total_thoughts,
                "isRevision": needs_revision,
                "revisesThought": revision_target if needs_revision else None,
                "branchFromThought": branch_origin if branching else None,
                "branchId": branch_id if branching else None,
            }
        )
        # Registrar no HypothesisDAG
        hyp_id = f"thought_{step_n}"
        hypothesis_dag.register(hyp_id, "sequential_thought", ...)
        if needs_revision:
            hypothesis_dag.invalidate_cascade(f"thought_{revision_target}")
        if branching:
            hypothesis_dag.add_edge(f"thought_{branch_origin}", hyp_id, "BRANCH")

  api:
    - "think_step(thought, step_n, total, is_revision=False, revises=None, branch_from=None) → dict"
    - "think_sequence(problem, max_thoughts=10) → list[thought_result]"

  fmea:
    rpn: 4
    mode: "Loop infinito: nextThoughtNeeded sempre True"
    probability: 2
    severity: 2
    detection: 1
    mitigation: "Hard cap: max_thoughts=20. Se step_n > max_thoughts: force nextThoughtNeeded=False."

