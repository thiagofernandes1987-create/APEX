# ─────────────────────────────────────────────────────────────────
# DIFF_SKILL_QUALITY_BAR_001 (OPP-94)
# Prioridade: P0 | Esforço: LOW | RPN: 2
# ─────────────────────────────────────────────────────────────────
skill_quality_bar:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-94
  tier: 1
  status: PROPOSED

  purpose: >
    Implementar o pipeline de qualidade do antigravity-awesome-skills v3
    no SkillIndexer. Toda skill ingerida passa por 6 checks obrigatórios
    antes de entrar no SkillDB — eliminando skills malformadas, oversized
    ou sem triggers de ativação.

  why: >
    O antigravity v3 (MAINTENANCE.md) define exatamente os critérios que
    diferem skills de produção de skills ruins. Sem quality bar, o SkillDB
    pode acumular 1.600+ skills com metadados errados, disparando falsos
    positivos no SemanticMatcher. Quality bar reduz ruído e aumenta precisão
    do Ω_Bayes score de ativação.

  description: >
    O QUE É: Pipeline de 6 verificações executado pelo LLM (estrutura) +
    sandbox (tamanho, hash) antes de cada ingestão no SkillDB.
    O QUE NÃO É: Bloqueio total — skills com WARNING são ingeridas com
    risk_level='unknown' e quality_flags marcados.
    CHECKS:
      1. Frontmatter YAML válido: name, description, risk, source, date_added
      2. ## When to Use section presente (obrigatória para SemanticMatcher)
      3. Frontmatter <= 1024 caracteres
      4. Tamanho total do diretório <= 8 MB
      5. SHA256 de SKILL.md calculado (detecta duplicatas e updates)
      6. UCO gate no primeiro script Python encontrado (H <= 50 para ingestion)

  what_if_fails: >
    FALLBACK 1 — Frontmatter inválido (ERROR):
      Rejeitar skill. Registrar em skill_registry.quality_errors. Log ao usuário.
    FALLBACK 2 — Seção "When to Use" ausente (WARNING):
      Ingerir com risk_level='unknown', quality_flags=['missing_use_section'].
      SemanticMatcher usa description como fallback para when[].
    FALLBACK 3 — Skill > 8 MB (ERROR):
      Ingerir apenas SKILL.md e arquivos <= 100 KB. Registrar truncation_flag.
    FALLBACK 4 — UCO gate falha em script (WARNING):
      Ingerir skill como LLM_BEHAVIOR (desabilita execução de scripts). Log.
    REGRA: Quality bar NUNCA bloqueia o pipeline de ingestão. Piora → warning.

  inject_when: "SkillIndexer.ingest_bundle() OR SkillIndexer.ingest_skill_dir()"
  depends_on: [uco_quality_gate, sqlite_snapshot_store]

  python_implementation: |
    class SkillQualityBar:
        REQUIRED_FIELDS = ["name", "description", "risk", "source"]
        MAX_FRONTMATTER_CHARS = 1024
        MAX_SKILL_SIZE_BYTES = 8 * 1024 * 1024  # 8 MB
        UCO_H_INGESTION_THRESHOLD = 50.0

        def validate(self, skill_id: str, skill_md_content: str,
                     skill_files: dict) -> dict:
            errors, warnings = [], []

            # 1. Frontmatter parse
            fm, body = _parse_frontmatter(skill_md_content)
            for field in self.REQUIRED_FIELDS:
                if field not in fm:
                    errors.append(f"MISSING_FIELD:{field}")

            # 2. When to Use section
            if "## When to Use" not in body and "## Use this skill when" not in body:
                warnings.append("MISSING_USE_SECTION")

            # 3. Frontmatter size
            fm_text = skill_md_content[:skill_md_content.rfind("---", 3)]
            if len(fm_text) > self.MAX_FRONTMATTER_CHARS:
                errors.append(f"FRONTMATTER_TOO_LONG:{len(fm_text)}")

            # 4. Total size
            total_bytes = sum(len(c.encode()) for c in skill_files.values())
            if total_bytes > self.MAX_SKILL_SIZE_BYTES:
                warnings.append(f"OVERSIZED:{total_bytes/1e6:.1f}MB")

            # 5. Content hash
            import hashlib
            content_hash = hashlib.sha256(skill_md_content.encode()).hexdigest()[:16]

            # 6. UCO check on first Python script
            for fpath, content in skill_files.items():
                if fpath.endswith(".py") and len(content) > 100:
                    # UCO gate check (reusa SB3)
                    uco_result = uco_quality_gate.gate(content, "EXPRESS")
                    if uco_result.get("decision") == "REJECTED":
                        warnings.append(f"UCO_SCRIPT_WARN:{fpath}")
                    break  # só o primeiro script

            return {
                "valid": len(errors) == 0,
                "errors": errors,
                "warnings": warnings,
                "content_hash": content_hash,
                "quality_score": max(0.0, 1.0 - 0.3 * len(errors) - 0.1 * len(warnings))
            }

  api:
    - "validate(skill_id, skill_md_content, skill_files) → {valid, errors, warnings, content_hash, quality_score}"

  fmea:
    rpn: 2
    mode: "False positive rejeitando skill válida por frontmatter incomum"
    probability: 1
    severity: 2
    detection: 1
    mitigation: "Rejeição apenas para REQUIRED_FIELDS + tamanho; resto é warning"

# ─────────────────────────────────────────────────────────────────
# DIFF_RISK_TAXONOMY_EXTENSION_001 (OPP-95)
# Prioridade: P0 | Esforço: MEDIUM | RPN: 16
# ─────────────────────────────────────────────────────────────────
risk_taxonomy_extended:
  executor: LLM_BEHAVIOR
  version: v00.33.0
  opp: OPP-95
  tier: 0
  status: PROPOSED

  purpose: >
    Estender o risk_level do DynamicSkillForge para incluir a categoria
    'offensive' do antigravity v3, com protocolo de autorização explícita.
    Permite ingestion de skills de pentest/red-team com controle rigoroso,
    em vez de bloquear completamente ou tratar como 'high'.

  why: >
    O antigravity v3 usa: none, safe, unknown, critical, offensive.
    O APEX v00.32.1 usa: unknown, safe, low, medium, high.
    Skills como metasploit-framework, active-directory-attacks, red-team-tactics
    são legitimas para profissionais de segurança mas requerem controle diferente.
    A categoria 'offensive' + autorização explícita é mais precisa que 'high'
    e permite uso legítimo com proteção adequada.

  description: >
    O QUE É: Extensão da skill_registry.risk_level e do ETHICAL_BARRIER
    para 5 categorias: none, safe, unknown, critical, offensive.
    O QUE NÃO É: Remoção de proteções — 'offensive' requer dois gates adicionais.
    MAPEAMENTO:
      none:      Sem impacto (info skills, documentação)
      safe:      Ativação automática sem aviso (maioria das skills)
      unknown:   Default para skills novas — ativação com aviso leve
      critical:  Requer USER_EXPLICIT + risk_acknowledgment na sessão
      offensive: Requer USER_EXPLICIT + APEX_OFFENSIVE_MODE=true + AUTHORIZED USE ONLY notice
    LISTA ESTÁTICA offensive: metasploit-framework, active-directory-attacks,
      red-team-tactics, red-team-tools, linux-privilege-escalation,
      windows-privilege-escalation, burpsuite-project-parser, sqlmap-database-pentesting.
    LISTA ESTÁTICA critical: pentest-checklist, pentest-commands, burp-suite-testing,
      ffuf-claude-skill, ffuf-web-fuzzing, shodan-reconnaissance, malware-analyst,
      memory-forensics, protocol-reverse-engineering, anti-reversing-techniques.

  what_if_fails: >
    FALLBACK 1 — APEX_OFFENSIVE_MODE não definido e skill offensive solicitada:
      Recusar ativação. Emitir [OFFENSIVE_SKILL_BLOCKED: requer APEX_OFFENSIVE_MODE=true].
      Oferecer alternativa safe (ex: security-audit em vez de metasploit).
    FALLBACK 2 — critical sem USER_EXPLICIT:
      Emitir aviso. Solicitar confirmação explícita antes de prosseguir.
    REGRA: ETHICAL_BARRIER é inviolável — 'offensive' não bypassa ética, apenas habilita
    ferramentas legítimas de segurança para usuários autorizados.

  inject_when: "DynamicSkillForge ativa skill OR SkillIndexer ingere skill"
  depends_on: [dynamic_skill_forge, ethical_barrier, protected_kernel_segment]

  activation_table:
    none:      {auto_activate: true,  warning: false, user_explicit: false, notice: false}
    safe:      {auto_activate: true,  warning: false, user_explicit: false, notice: false}
    unknown:   {auto_activate: true,  warning: true,  user_explicit: false, notice: false}
    critical:  {auto_activate: false, warning: true,  user_explicit: true,  notice: true}
    offensive: {auto_activate: false, warning: true,  user_explicit: true,  env_flag: "APEX_OFFENSIVE_MODE=true", notice: "AUTHORIZED USE ONLY — offensive security skills"}

  authorized_use_notice: |
    ⚠️ AUTHORIZED USE ONLY
    Esta skill contém capacidades ofensivas de segurança.
    Use exclusivamente em ambientes autorizados e com permissão explícita.
    Uso não autorizado pode violar leis e regulamentos.
    [OFFENSIVE_SKILL_ACTIVATED: {skill_id} | session: {session_id}]

  constitutional_citation:
    section: "Being broadly ethical → Avoiding harm"
    rationale: >
      A categoria 'offensive' NÃO viola a constituição — hacking ético autorizado
      é uma prática legítima. O protocolo de autorização garante que apenas
      usuários com contexto legítimo ativem essas ferramentas.

  fmea:
    rpn: 16
    mode: "Skill offensive ativada sem autorização real"
    probability: 2
    severity: 4
    detection: 2
    mitigation: >
      PROTECTED_KERNEL_SEGMENT + ETHICAL_BARRIER invioláveis.
      Lista estática hardcoded. USER_EXPLICIT + env flag duplo.
      Todas as ativações offensive registradas em event_bus + KG memory.

# ─────────────────────────────────────────────────────────────────
# DIFF_MCP_BRIDGE_REAL_001 (OPP-96)
# Prioridade: P1 | Esforço: HIGH | RPN: 12
# ─────────────────────────────────────────────────────────────────
mcp_bridge_v2:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-96
  tier: 1
  status: PROPOSED

  purpose: >
    Implementar o mcp_bridge que estava declarado como activation_roadmap
    desde v00.17.0 mas nunca foi construído. Usa o padrão sdk_mcp_servers
    do claude-agent-sdk-python: servidores MCP in-process sem socket overhead.
    Habilita Knowledge Graph, Sequential Thinking, Filesystem e Git nativamente.

  why: >
    O claude-agent-sdk-python Query.__init__() aceita sdk_mcp_servers:
    dict[str, McpServer] — servidores MCP rodando no mesmo processo Python
    sem latência de rede. Os servidores de referência (servers-main) são
    implementações prontas para: memory (Knowledge Graph), sequentialthinking,
    filesystem, git, fetch, time. Zero dependências externas além do mcp SDK
    (já usado pelo agent-sdk). Resolver este gap desbloqueia o KG persistente
    (OPP-97), structured thinking (OPP-103) e git evolution (OPP-104).

  description: >
    O QUE É: Dict de servidores MCP in-process, gerenciado pelo APEX,
    chamado via mcp_bridge.call_tool(server, tool, params).
    O QUE NÃO É: Conexão socket externa — servers rodam no mesmo processo.
    O QUE NÃO É: O mcp_bridge antigo (activation_roadmap) — este é implementação real.
    COMO FUNCIONA:
      1. Na SessionStart hook: inicializar servidores disponíveis
      2. DynamicSkillForge e módulos consultam mcp_bridge.call_tool()
      3. Resultados retornam como dicts Python — sem parsing de JSON de rede
      4. Fallback gracioso se servidor não disponível

  what_if_fails: >
    FALLBACK 1 — mcp SDK não instalado:
      Declarar [MCP_BRIDGE_UNAVAILABLE]. Operar sem MCP servers.
      SnapshotStore continua funcionando. KG não disponível.
    FALLBACK 2 — servidor específico falha na inicialização:
      Registrar [MCP_SERVER_FAILED: server_name]. Continuar sem aquele servidor.
      Outros servidores continuam disponíveis.
    FALLBACK 3 — call_tool() timeout (> 5s):
      Retornar {error: "TIMEOUT"}. Declarar [MCP_TOOL_TIMEOUT].
      LLM opera sem resultado do MCP tool.
    REGRA: mcp_bridge NUNCA bloqueia o pipeline APEX. É enriquecimento opcional.

  inject_when: "SessionStart hook OR DynamicSkillForge.load_skill() com skill que requer MCP"
  depends_on: [event_bus, sqlite_snapshot_store]

  servers_registry:
    memory:
      source: "servers-main/src/memory (Knowledge Graph)"
      tools: [create_entities, create_relations, add_observations, read_graph,
               search_nodes, open_nodes, delete_entities, delete_observations]
      persist: "knowledge_graph.json em /tmp/apex_kg.json"
      apex_use: "KG persistente de sessions, skills, hipóteses e findings"

    sequentialthinking:
      source: "servers-main/src/sequentialthinking"
      tools: [sequential_thinking]
      apex_use: >
        Structured thinking em modo DEEP/RESEARCH — cada step de raciocínio
        como thought com thoughtNumber/totalThoughts/isRevision/branchFromThought.
        Complementa HypothesisDAG: DAG rastreia dependências, sequential_thinking
        guia a exploração passo-a-passo com capacidade de revisão e branching.

    filesystem:
      source: "servers-main/src/filesystem"
      tools: [read_file, write_file, list_directory, create_directory, search_files]
      security: "allowed_roots definido em APEX config — NÃO filesystem global"
      apex_use: "PoT Bridge: leitura de scripts de skills, gravação de resultados"

    git:
      source: "servers-main/src/git (Python)"
      tools: [git_status, git_log, git_diff, git_commit, git_add, git_push,
               git_create_branch, git_checkout]
      apex_use: "Self-Evolution Protocol: branch → edit → commit → push → PR"
      requires: "APEX_SELF_EVOLUTION=true para operações write (commit/push)"

    github:
      source: "github-mcp-server"
      tools: [search_repositories, get_file_contents, create_or_update_file,
               create_pull_request, create_issue, fork_repository, search_code]
      requires_env: "GITHUB_PERSONAL_ACCESS_TOKEN"
      apex_use: "SkillIndexer: descoberta e clonagem de skill repos"

  python_implementation: |
    class MCPBridge:
        """MCP Bridge v2 — in-process servers via sdk_mcp_servers pattern."""

        def __init__(self):
            self._servers: dict[str, Any] = {}
            self._available: dict[str, bool] = {}

        def initialize(self, server_names: list[str] | None = None):
            """Inicializa servidores MCP disponíveis na sessão."""
            target = server_names or ["memory", "sequentialthinking", "filesystem"]
            for name in target:
                try:
                    server = self._create_server(name)
                    self._servers[name] = server
                    self._available[name] = True
                    print(f"[MCP_BRIDGE] {name}: READY")
                except Exception as e:
                    self._available[name] = False
                    print(f"[MCP_BRIDGE] {name}: FAILED ({type(e).__name__})")

        def call_tool(self, server: str, tool: str, params: dict) -> dict:
            """Chama uma tool de um servidor MCP in-process."""
            if not self._available.get(server, False):
                return {"error": f"MCP_SERVER_UNAVAILABLE:{server}"}
            try:
                result = self._servers[server].call_tool(tool, params)
                return {"result": result, "server": server, "tool": tool}
            except TimeoutError:
                return {"error": f"MCP_TOOL_TIMEOUT:{server}.{tool}"}
            except Exception as e:
                return {"error": f"MCP_TOOL_ERROR:{e}"}

        def available(self, server: str) -> bool:
            return self._available.get(server, False)

        def _create_server(self, name: str) -> Any:
            """Lazy import de servidor MCP."""
            if name == "memory":
                from mcp_servers.memory import MemoryServer
                return MemoryServer(persist_path="/tmp/apex_kg.json")
            elif name == "sequentialthinking":
                from mcp_servers.sequential_thinking import SequentialThinkingServer
                return SequentialThinkingServer()
            elif name == "filesystem":
                from mcp_servers.filesystem import FilesystemServer
                allowed = ["/tmp/apex_skills", "/home/claude/apex_outputs"]
                return FilesystemServer(allowed_roots=allowed)
            elif name == "git":
                from mcp_servers.git import GitServer
                return GitServer()
            else:
                raise ValueError(f"Unknown server: {name}")

  api:
    - "initialize(server_names: list[str] | None) → None — inicializa servers na SessionStart"
    - "call_tool(server: str, tool: str, params: dict) → dict — chama tool MCP"
    - "available(server: str) → bool — verifica disponibilidade"

  events_emitted:
