# ─────────────────────────────────────────────────────────────────
# DIFF_ORJSON_SNAPSHOT_001 (OPP-92)
# Prioridade: P0 | Esforço: LOW | RPN: 2 | Aplicar IMEDIATAMENTE
# ─────────────────────────────────────────────────────────────────
orjson_serializer:
  executor: SANDBOX_CODE
  version: v00.33.0
  opp: OPP-92
  tier: 0
  status: PROPOSED

  purpose: >
    Substituir json stdlib por orjson (Rust) em todos os pontos de
    serialização do APEX. orjson é 10× mais rápido em dumps e 2× em loads,
    com suporte nativo a numpy arrays, datetime e UUID — zero conversão manual.
    Resolve o overhead de serialização do SnapshotStore, event_bus e SkillDB.

  why: >
    json Python puro: ~2ms para serializar 50 KB de snapshot.
    orjson (Rust+PyO3): ~0.2ms para o mesmo payload — 10× mais rápido.
    Para sessões DEEP com 50+ snapshots, isso representa -80% do tempo de I/O.
    orjson já está disponível em sandbox (pré-instalado junto com numpy/scipy).
    Zero dependência nova. Zero breaking change: API drop-in para json.dumps/loads.
    Suporte nativo a numpy arrays elimina a conversão manual em CodeGenetics e MC Simulator.

  description: >
    O QUE É: Wrapper drop-in que substitui json.dumps/loads por orjson.dumps/loads
    com opção OPT_SERIALIZE_NUMPY para arrays numpy sem conversão.
    O QUE NÃO É: Mudança de formato — output é JSON válido idêntico ao anterior.
    O QUE NÃO É: Dependência nova — orjson pré-instalado na sandbox.
    COMO FUNCIONA: import orjson; use orjson.dumps(obj, option=orjson.OPT_SERIALIZE_NUMPY)
    em vez de json.dumps(obj). Para loads: orjson.loads(s) em vez de json.loads(s).
    PONTOS AFETADOS:
      1. sqlite_snapshot_store.save_session() e load_delta_for_session()
      2. snapshot_store._disk_save() e _disk_load()
      3. event_bus.emit() — serialização de payloads
      4. entropy_weighted_merge() — leitura de múltiplos snapshots
      5. code_genetics_map — serialização de vaccines no SQLite
      6. SkillDB.pot_tools.parameters_json e scripts_json
      7. hypothesis_dag.compress_for_snapshot()

  what_if_fails: >
    FALLBACK 1 — orjson não disponível (sandbox antiga):
      Detectar via: try: import orjson; except ImportError: import json as orjson.
      Fallback transparente para json stdlib. Declarar [ORJSON_UNAVAILABLE].
      Performance degradada mas funcionalidade 100% preservada.
    FALLBACK 2 — orjson.OPT_SERIALIZE_NUMPY não funciona para tipo específico:
      Converter array para .tolist() antes de serializar. Fallback já documentado.
    REGRA: NUNCA quebrar serialização por causa do orjson. Sempre ter fallback json.

  inject_when: always
  depends_on: [sqlite_snapshot_store, snapshot_store, event_bus]

  python_implementation: |
    # Substituição drop-in — adicionar no topo de cada módulo afetado:
    try:
        import orjson
        def _dumps(obj) -> bytes:
            return orjson.dumps(obj, option=orjson.OPT_SERIALIZE_NUMPY)
        def _loads(s):
            return orjson.loads(s)
        _JSON_BACKEND = "orjson"
    except ImportError:
        import json
        def _dumps(obj) -> bytes:
            return json.dumps(obj, sort_keys=True, separators=(',',':')).encode()
        def _loads(s):
            return json.loads(s)
        _JSON_BACKEND = "json_stdlib"

    # No save_session() do SQLite SnapshotStore:
    # data_bytes = _dumps(state_dict)   # em vez de json.dumps(...)
    # data_str = data_bytes.decode()    # SQLite armazena como TEXT

    # No load_delta_for_session():
    # state = _loads(row['data'])       # em vez de json.loads(...)

  api:
    - "_dumps(obj) → bytes — serializa com orjson se disponível, json como fallback"
    - "_loads(s: str | bytes) → Any — deserializa com orjson se disponível"

  import_whitelist_add: [orjson]

  fmea:
    rpn: 2
    mode: "orjson indisponível em sandbox antiga"
    probability: 1
    severity: 2
    detection: 1
    mitigation: "try/except com fallback json stdlib — transparente ao caller"

