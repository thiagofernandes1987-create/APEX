# ─────────────────────────────────────────────────────────────────
# DIFF_UCO_EXTENDED_METRICS_001 (OPP-101)
# Prioridade: P1 | Esforço: MEDIUM | RPN: 4
# ─────────────────────────────────────────────────────────────────
uco_quality_gate_v2:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-101
  tier: 1
  status: PROPOSED

  purpose: >
    Expandir o UCO gate (SB3) com 3 métricas adicionais: performance_profile
    (ms/KB estimado), io_call_count e serialization_detector. O serialization_detector
    substitui automaticamente json por orjson no AUTO_FIXED path — combinando
    OPP-92 com OPP-101.

  why: >
    O UCO gate atual detecta complexidade estrutural (H, CC) mas não
    performance de runtime. Um script com H=5 que faz json.loads() em loop
    de 10.000 iterações tem performance ruim que o H não captura.
    Os benchmarks do orjson-anthropic fornecem dados reais de performance:
    ~0.2ms/50KB com orjson vs ~2ms/50KB com json — referência calibrada.
    O serialization_detector no AUTO_FIXED path cria uma auto-otimização
    concreta e mensurável.

  description: >
    Extensão do uco_quality_gate existente — NÃO substitui, adiciona campos.
    NOVAS MÉTRICAS:
      performance_profile.estimated_ms_per_kb:
        Estimativa baseada em: I/O calls × 0.5ms + loops × 0.01ms + numpy × 0.001ms
        Threshold: > 10ms/KB = [UCO_PERF_WARN]
      io_call_count:
        Conta: open(), read(), write(), requests.get(), urlopen()
        Threshold: > 3 I/O calls = avisar sobre parallelismo
      serialization_format:
        Detecta: "import json" → substitui por "import orjson as json" no AUTO_FIX
        Só substitui se já não há orjson no código
    CALIBRAÇÃO UCO_CAL atualizada:
      Inclui: H={h:.1f}, bugs≈{bugs:.2f}, perf≈{perf:.1f}ms/KB, io={io}

  what_if_fails: >
    Métricas adicionais são enriquecimento — falha silenciosa, continua sem elas.
    serialization_detector falha → AUTO_FIX apenas via quick_optimize() existente.

  inject_when: "cognitive_mode IN [DEEP, RESEARCH, SCIENTIFIC] AND PoT program para execução"
  depends_on: [uco_quality_gate]

  python_implementation: |
    # Extensão do método gate() existente:
    def _compute_extended_metrics(self, code: str) -> dict:
        """Compute extended UCO metrics for performance profiling."""
        import ast, re

        # I/O call detection
        io_patterns = ['open(', 'requests.', 'urlopen(', '.read(', '.write(', 'subprocess']
        io_count = sum(code.count(p) for p in io_patterns)

        # Loop depth estimate
        loop_count = code.count('for ') + code.count('while ')

        # Estimated performance (rough heuristic)
        size_kb = len(code) / 1024
        est_ms = io_count * 0.5 + loop_count * 0.01
        est_ms_per_kb = est_ms / max(size_kb, 0.1)

        # Serialization detection
        uses_json = 'import json' in code and 'import orjson' not in code
        json_calls = code.count('json.dumps') + code.count('json.loads')

        return {
            "io_call_count": io_count,
            "estimated_ms_per_kb": round(est_ms_per_kb, 2),
            "uses_stdlib_json": uses_json,
            "json_call_count": json_calls,
            "perf_warning": est_ms_per_kb > 10.0
        }

    def _auto_fix_serialization(self, code: str) -> tuple[str, bool]:
        """AUTO_FIX: replace json with orjson if beneficial."""
        if 'import json' in code and 'import orjson' not in code:
            fixed = code.replace('import json\n', 'try:\n    import orjson as json\nexcept ImportError:\n    import json\n')
            return fixed, True
        return code, False

  updated_confidence_calibration:
    output_label: "{calibrated_confidence} [UCO_CAL: H={h:.1f}, bugs≈{bugs:.2f}, perf≈{perf:.1f}ms/KB, io={io}]"

  fmea:
    rpn: 4
    mode: "serialization_detector faz substituição incorreta em código que usa json propositalmente"
    probability: 2
    severity: 2
    detection: 1
    mitigation: "Substituição apenas no AUTO_FIXED path (H > threshold). Usuário vê código modificado."

