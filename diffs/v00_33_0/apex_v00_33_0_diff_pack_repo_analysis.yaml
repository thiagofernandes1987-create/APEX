# ─────────────────────────────────────────────────────────────────
# DIFF_KNOWLEDGE_GRAPH_MEMORY_001 (OPP-97)
# Prioridade: P1 | Esforço: MEDIUM | RPN: 8
# ─────────────────────────────────────────────────────────────────
knowledge_graph_memory:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-97
  tier: 1
  status: PROPOSED

  purpose: >
    Substituir o SnapshotStore textual por um Knowledge Graph tipado persistente,
    usando o Memory MCP Server (servers-main/src/memory). Entidades tipadas
    (session, skill, hypothesis, finding, agent) com relações semânticas substituem
    snapshots genéricos de texto — possibilitando queries estruturadas como
    "quais skills resolveram problemas similares a este?".

  why: >
    O SnapshotStore atual serializa dicts genéricos. Um KG tipado permite:
    1. search_nodes("hipótese relacionada a crescimento logístico") → entidades reais
    2. open_nodes(["session_2026-04-01"]) → todas as skills usadas nessa sessão
    3. Relações: hypothesis SUPPORTS finding; skill SOLVED_BY agent; session USES skill
    O Memory Server persiste em /tmp/apex_kg.json — sobrevive reinicializações
    dentro da mesma sessão de chat (idêntico ao SnapshotStore SQLite).
    read_graph() retorna o estado completo para inicialização incremental.

  description: >
    O QUE É: Camada de KG sobre o Memory MCP Server — entidades e relações
    APEX-específicas que complementam (não substituem) o SnapshotStore SQLite.
    O QUE NÃO É: Substituição do SnapshotStore — os dois coexistem.
    ENTIDADES:
      session: {id, mode, timestamp, hypotheses_count, skills_used}
      skill: {id, domain, omega_score, activation_count, last_used}
      hypothesis: {id, text, confidence, status: active|rejected|adopted}
      finding: {id, text, confidence_chain}
      agent: {id, role, phase, blocks_completed}
    RELAÇÕES:
      session HAS hypothesis
      hypothesis SUPPORTS finding
      skill USED_IN session
      agent PRODUCED finding
      hypothesis DEPENDS_ON hypothesis (=HypothesisDAG edge)
    QUERIES ÚTEIS:
      search_nodes("") → todas as entidades ativas
      search_nodes(skill_id) → histórico de uso desta skill
      open_nodes(hypothesis_ids) → detalhes das hipóteses sobreviventes

  what_if_fails: >
    FALLBACK 1 — Memory MCP não disponível:
      Continuar com SnapshotStore SQLite apenas. Declarar [KG_UNAVAILABLE].
      Funcionalidade 100% preservada — KG é enrichment, não core.
    FALLBACK 2 — read_graph() retorna grafo corrompido:
      Inicializar KG vazio. Emitir [KG_RESET: corrupt_data].
      Continuar sessão do zero para KG (snapshot SQL preservado).
    FALLBACK 3 — create_entities() falha:
      Silenciar erro. Pipeline não interrompido. Log em event_bus.
    REGRA: KG NUNCA é source of truth para operações críticas — é busca e enriquecimento.

  inject_when: "SessionStart hook (inicialização) | STEP_13 (persistência)"
  depends_on: [mcp_bridge_v2, sqlite_snapshot_store, event_bus]

  apex_kg_api:
    - "kg_init_session(session_id, mode) → entity_id"
    - "kg_register_skill(skill_id, omega_score) → entity_id"
    - "kg_add_hypothesis(hyp_id, text, confidence) → entity_id"
    - "kg_add_finding(finding_id, text, source_agent) → entity_id"
    - "kg_link(src_id, dst_id, relation_type) → bool"
    - "kg_search(query: str) → list[entity]"
    - "kg_get_skill_history(skill_id) → list[session]"
    - "kg_get_hypothesis_chain(hyp_id) → list[entity]"
    - "kg_snapshot() → dict — persiste no Memory MCP"

  initialization_protocol: |
    # No SessionStart hook:
    existing_graph = mcp_bridge.call_tool("memory", "read_graph", {})
    if existing_graph.get("entities"):
        # Sessão incremental — KG já tem histórico
        emit(KG_LOADED: {entities_count: len(existing_graph["entities"])})
    else:
        # Sessão nova — KG vazio
        emit(KG_INITIALIZED_EMPTY)
    # Registrar nova sessão
    kg_init_session(new_session_id, cognitive_mode)

  fmea:
    rpn: 8
    mode: "Memory MCP server não disponível ou grafo corrompido"
    probability: 2
    severity: 2
    detection: 2
    mitigation: "Fallback para SnapshotStore SQLite. KG é enrichment, não core."

# ─────────────────────────────────────────────────────────────────
# DIFF_SESSION_FORK_001 (OPP-98)
# Prioridade: P1 | Esforço: MEDIUM | RPN: 12
# ─────────────────────────────────────────────────────────────────
session_fork_protocol:
  executor: HYBRID
  version: v00.33.0
  opp: OPP-98
  tier: 2
  status: PROPOSED

  purpose: >
    Adicionar fork/merge de sessão ao SnapshotStore, baseado no padrão
    fork_session do claude-agent-sdk-python session_mutations.py.
    Permite que o Multi-PoT especulativo (SB2) crie ramificações reais
    de estado em vez de compartilhar o mesmo contexto linear.

  why: >
    O session_mutations.py do SDK implementa fork_session() que copia
    o arquivo .jsonl de uma sessão para um novo UUID, permitindo exploração
    especulativa sem contaminar a sessão principal. No APEX, isso significa
    que cada caminho do Multi-PoT (optimistic/pessimistic/neutral) pode
    partir de um estado independente e o vencedor (entropy_weighted_merge)
    é mergeado de volta. Isso reduz correlação entre programas de ~30% para ~10%.

  description: >
    O QUE É: Extensão do SnapshotStore com operações fork/merge/discard
    seguindo o padrão do SDK's session_mutations.
    O QUE NÃO É: Fork de processo Python — é fork de estado serializado.
    O QUE NÃO É: Isolamento real de LLM — o modelo ainda é single-context.
    COMO FUNCIONA:
      1. parallel_pot_executor solicita fork antes de cada caminho especulativo
      2. fork() copia snapshot atual para novo UUID em SQLite
      3. Cada caminho opera sobre seu fork independente
      4. entropy_weighted_merge seleciona vencedor
      5. merge_fork() copia estado vencedor para sessão principal
      6. discard_fork() limpa os forks perdedores

  what_if_fails: >
    FALLBACK 1 — SQLite não suporta fork (erro de I/O):
      Continuar com comportamento atual (sem fork). Declarar [FORK_UNAVAILABLE].
      Multi-PoT continua funcional com correlação ~30%.
    FALLBACK 2 — merge_fork() encontra conflito de esquema:
      Usar entropy_weighted_merge sobre os snapshots sem fork.
      Declarar [FORK_MERGE_FALLBACK].
    FALLBACK 3 — fork orphan (merge nunca chamado após 10 min):
      vacuum_if_due() limpa forks órfãos automaticamente.
    REGRA: Fork NUNCA é obrigatório — é otimização opcional para SB2.

  inject_when: "parallel_pot_executor executa em modo DEEP+ (>= 2 programas)"
  depends_on: [sqlite_snapshot_store, parallel_pot_executor]

  python_implementation: |
    # Extensão do SQLiteSnapshotStore:
    import uuid

    def fork(self, source_session_id: str) -> str:
        """Fork a session state to a new UUID for speculative exploration."""
        new_id = str(uuid.uuid4())
        # Copy all delta rows from source to new session
        conn = sqlite3.connect(self._db_path)
        rows = conn.execute(
            "SELECT * FROM session_deltas WHERE session_id = ?",
            (source_session_id,)
        ).fetchall()
        for row in rows:
            conn.execute(
                "INSERT INTO session_deltas VALUES (?,?,?,?)",
                (new_id, row[1], row[2], row[3])  # new session_id, rest same
            )
        conn.commit()
        conn.close()
        return new_id  # fork_uuid

    def merge_fork(self, fork_uuid: str, target_session_id: str) -> bool:
        """Merge winning fork state into target session."""
        try:
            conn = sqlite3.connect(self._db_path)
            # Get latest delta from fork
            latest = conn.execute(
                "SELECT data FROM session_deltas WHERE session_id=? ORDER BY ts DESC LIMIT 1",
                (fork_uuid,)
            ).fetchone()
            if not latest:
                return False
            # Append to target session
            conn.execute(
                "INSERT INTO session_deltas (session_id, ts, data, source) VALUES (?,?,?,?)",
                (target_session_id, _now(), latest[0], f"fork_merge:{fork_uuid}")
            )
            conn.commit()
            conn.close()
            return True
        except Exception as e:
            print(f"[FORK_MERGE_ERROR] {e}")
            return False

    def discard_fork(self, fork_uuid: str) -> None:
        """Remove fork data (losing speculation)."""
        conn = sqlite3.connect(self._db_path)
        conn.execute("DELETE FROM session_deltas WHERE session_id=?", (fork_uuid,))
        conn.commit()
        conn.close()

  api:
    - "fork(source_session_id) → fork_uuid"
    - "merge_fork(fork_uuid, target_session_id) → bool"
    - "discard_fork(fork_uuid) → None"

  fmea:
    rpn: 12
    mode: "Fork órfão acumula no SQLite — crescimento descontrolado"
    probability: 2
    severity: 3
    detection: 2
    mitigation: "vacuum_if_due() extendido para limpar forks > 30 min sem merge"

# ─────────────────────────────────────────────────────────────────
# DIFF_TOKEN_BUDGET_TRACKER_001 (OPP-99)
# Prioridade: P1 | Esforço: MEDIUM | RPN: 4
# ─────────────────────────────────────────────────────────────────
token_budget_tracker:
  executor: LLM_BEHAVIOR
  version: v00.33.0
  opp: OPP-99
  tier: 2
  status: PROPOSED

  purpose: >
    Implementar rastreamento real de tokens por sessão, stage e skill,
    baseado no TokenTracker do RIV2025 (token_tracker.py). Expande o
    fractal_budget_gate de um threshold estático para um sistema de
    warnings graduais com estimativa de custo em USD.

  why: >
    O fractal_budget_gate atual é trigger binário: "budget quase esgotado →
    comprimir". Sem custo real em USD ou breakdown por stage, o usuário não
    sabe onde os tokens estão sendo gastos. O TokenTracker do RIV2025 tem
    exatamente os campos necessários: input, output, cache_creation,
    cache_read, cost_usd, api_calls. Com isto, o APEX pode reportar
    "[BUDGET: 45% usado | 0.23 USD | stage=MCFE/STEP_7]" em vez de apenas
    um threshold percentual.

  description: >
    O QUE É: Acumulador de métricas de tokens por sessão com warnings graduais.
    O QUE NÃO É: Medição real de tokens via API — é estimativa baseada em
    contagem de caracteres / 4 (heurística padrão) [APPROX].
    CAMPOS RASTREADOS:
      input_tokens: estimativa de tokens de input acumulados
      output_tokens: estimativa de tokens de output gerados
      cache_creation_tokens: tokens criando cache (estimativa)
      cache_read_tokens: tokens lidos do cache (estimativa)
      estimated_cost_usd: custo estimado baseado em pricing do modelo
      api_calls: número de chamadas de geração nesta sessão
    WARNINGS:
      WARNING_MEDIUM (60%): [BUDGET_WARNING: 60% | {breakdown}]
      WARNING_HIGH (80%): [BUDGET_HIGH: 80% | comprimir contexto]
      WARNING_CRITICAL (95%): [BUDGET_CRITICAL: 95% | checkpoint obrigatório]
      HARD_STOP (100%): trigger fractal_budget_gate.COMPRESS imediato

  what_if_fails: >
    FALLBACK: Estimativa imprecisa. O tracker é [APPROX] por natureza.
    Se cálculo falhar: continuar sem tracking. Nunca bloquear pipeline.

  inject_when: always
  depends_on: [fractal_budget_gate, attention_anchors_module]

  pricing_table:
    claude_sonnet_4_6:
      input_per_million: 3.00
      output_per_million: 15.00
      cache_write_per_million: 3.75
      cache_read_per_million: 0.30
    claude_opus_4_6:
      input_per_million: 15.00
      output_per_million: 75.00
      cache_write_per_million: 18.75
      cache_read_per_million: 1.50

  warning_thresholds:
    WARNING_MEDIUM: 0.60
    WARNING_HIGH: 0.80
    WARNING_CRITICAL: 0.95
    HARD_STOP: 1.00
    session_max_usd: 10.00  # limite padrão — ajustável por usuário

  output_format: >
    [BUDGET: {pct_used:.0%} | {cost_usd:.4f} USD | stage={current_stage} |
     input={input_tokens} | output={output_tokens} | cache_r={cache_read}]

  api:
    - "update(stage, input_tokens, output_tokens, cache_creation=0, cache_read=0) → None"
    - "get_summary() → {pct_used, cost_usd, breakdown_by_stage}"
    - "check_warnings() → list[str] — [WARNING_MEDIUM, WARNING_HIGH, ...]"
    - "should_hard_stop() → bool"

  fmea:
    rpn: 4
    mode: "Estimativa muito imprecisa causa falso WARNING_HIGH"
    probability: 2
    severity: 2
    detection: 1
    mitigation: "Tag [APPROX] em todas as estimativas. Warnings são sugestões, não bloqueios."

