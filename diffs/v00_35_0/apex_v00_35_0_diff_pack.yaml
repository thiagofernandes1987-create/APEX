    que ele chama NÃO EXISTIA no prompt. Isso significa que em toda sessão APEX anterior,
    quando o LLM "executava o UCO gate", estava simulando as métricas AST via raciocínio
    probabilístico — exatamente a circularidade que o UCO foi criado para eliminar.
    OPP-120 resolve isso com implementação Python real de ~430 linhas usando apenas ast
    (stdlib) — sem dependências externas, disponível em todo runtime Python.

