# ─────────────────────────────────────────────────────────────────
# DIFF_UNDEFINED_MODULES_SCAFFOLD_001 (OPP-121)
# Prioridade: P0 | Esforço: MEDIUM | RPN: 9
# GAP G3: 13 dependências não definidas no prompt (apex_superrepo_boot, forgeskills_rapid_reader, etc.)
# ─────────────────────────────────────────────────────────────────
undefined_modules_scaffold:
  executor: LLM_BEHAVIOR
  version: v00.35.0
  opp: OPP-121
  tier: 0
  status: PROPOSED

  purpose: >
    Definir formalmente os 8 módulos referenciados em depends_on mas inexistentes no prompt.
    Cada definição é a mínima necessária para que o LLM saiba como invocar o módulo.
    Não substitui implementações completas futuras — estabelece contratos de interface.

  why: >
    WHY: Auditoria 2026-04-10 identificou via regex que depends_on referencia módulos
    inexistentes: apex_superrepo_boot (base do STEP_0!), forgeskills_rapid_reader,
    hyperbolic_anchor_map, dynamic_agent_roster, mcp_bridge_v2, subprocess_engine,
    diff_ast_guard. Quando o LLM segue depends_on para um módulo inexistente, ou inventa
    comportamento (hallucination) ou simplesmente ignora a dependência silenciosamente.
    Ambos são falhas: o primeiro é perigoso, o segundo anula o módulo dependente.

  what_if_fails: "Definições mínimas — não há modo de falha crítico"
  inject_when: "Leitura inicial do prompt — antes de STEP_0"
  depends_on: []

  module_definitions:

    apex_superrepo_boot:
      executor: LLM_BEHAVIOR
      opp: OPP-104
      purpose: >
        Boot do repositório APEX no GitHub. Lê INDEX.md via urllib.request (ou git clone
        em FULL_CLAUDE_CODE). Popula session.skill_registry com skills descobertas.
        Registra catalog_files no mcp_bridge. Emite [APEX_BOOT_COMPLETE: N skills].
      invocation: |
        # STEP_0 — apex_superrepo_boot:
        # 1. Verificar APEX_SESSION_CAPS["forge_method"]
        # 2. SE git_clone: git clone --depth=1 https://github.com/thiagofernandes1987-create/APEX /tmp/apex_repo
        # 3. SE urllib_fetch: urllib.request.urlopen(raw_base + "INDEX.md") → parse YAML domain_map
        # 4. SE inline_paste: usar skills conhecidas da sessão anterior
        # 5. Extrair paths de skills do domain_map → session.skill_registry
        # 6. Emitir [APEX_BOOT_COMPLETE: {n_skills} skills | method: {forge_method}]
      raw_base: "https://raw.githubusercontent.com/thiagofernandes1987-create/APEX/main/"
      index_path: "INDEX.md"
      timeout_sec: 20
      fallback: "Continuar sem boot. Usar skills conhecidas do prompt base."

    forgeskills_rapid_reader:
      executor: LLM_BEHAVIOR
      opp: OPP-106
      purpose: >
        Pipeline 4-estágios para ingestão rápida de skills do repositório.
        Estágio 1: Ler INDEX.md (fast-path). Estágio 2: Filtrar por âncoras ativas.
        Estágio 3: Fetch SKILL.md dos paths relevantes. Estágio 4: Injetar no contexto.
      stages:
        1_index: "Fetch INDEX.md → parse domain_map YAML → extrair paths por domínio"
        2_filter: "Comparar anchors do domain_map com session.active_anchors → selecionar top-K"
        3_fetch:  "Fetch SKILL.md para cada path selecionado via forge_method"
        4_inject: "Registrar skills em session.skill_registry com status PROVISIONAL"
      max_skills_per_boot: 10
      fallback: "Se INDEX.md inacessível: usar skills embutidas no prompt base"

    hyperbolic_anchor_map:
      executor: LLM_BEHAVIOR
      opp: OPP-107
      purpose: >
        Mapa de âncoras em espaço hiperbólico para ativação cross-domain.
        Bridges pré-definidas: legal↔math, finance↔legal, science↔math, etc.
        attraction_engine.compute() usa os pesos dos bridges para selecionar skills.
      base_bridges:
        legal_math:    {a: [legal, contrato, obrigacao], b: [juros, calculo, IGPM], strength: 0.95}
        finance_legal: {a: [equity, DCF, valuation], b: [compliance, sec_edgar, contract], strength: 0.65}
        science_math:  {a: [hypothesis, simulation, bayesian], b: [statistics, probability, linear_algebra], strength: 0.85}
        engineering_math: {a: [algorithm, optimization, graph], b: [calculus, gradient, complexity], strength: 0.65}
        healthcare_science: {a: [clinical, medicine, genomics], b: [biology, chemistry, drug_discovery], strength: 0.75}
      usage: "attraction_engine.compute(query_anchors) → select skills with highest bridge activation"

    dynamic_agent_roster:
      executor: LLM_BEHAVIOR
      opp: OPP-116
      purpose: >
        Registro dinâmico de agentes ativos na sessão. Agentes base sempre presentes.
        Community agents ativados pelo meta_reasoning quando domínio detectado.
      base_agents:
        - pmi_pm, architect, engineer, critic, researcher
        - meta_reasoning, scientist_agent, bayesian_curator
        - anchor_destroyer, diff_governance
      optional_community_agents: "Definidos em community_agent_roster (OPP-116)"
      activation: "meta_reasoning.select_agents(task_domain) → roster ativo"
      max_concurrent: 4

    mcp_bridge_v2:
      executor: LLM_BEHAVIOR
      opp: OPP-96
      purpose: >
        Registry de MCP servers por domínio. forgeskills_catalog_boot popula em STEP_0.
        Consultar para obter URLs de servers relevantes ao domínio atual.
      server_registry: {}  # Populado em STEP_0 por forgeskills_catalog_boot
      lookup: "mcp_bridge_v2.get_servers(domain) → [{'name': name, 'url': url}]"
      trusted_domains: ["https://raw.githubusercontent.com/thiagofernandes1987-create/"]

    subprocess_engine:
      executor: SANDBOX_CODE
      opp: OPP-67
      purpose: >
        Wrapper sobre subprocess.run() para execução segura de PoT programs.
        Aplica timeout, captura stderr, valida exit code.
      available_when: "APEX_SESSION_CAPS['subprocess'] == True"
      fallback: "exec() inline se subprocess indisponível (sem isolamento de processo)"
      api: "run(code_str, timeout=30) → {stdout, stderr, exit_code, success}"

    diff_ast_guard:
      executor: LLM_BEHAVIOR
      opp: OPP-77
      purpose: >
        Guard que verifica se um DIFF candidato não introduz módulos proibidos
        (subprocess, tempfile, sqlite3) na IMPORT_WHITELIST do DynamicSkillForge.
      check: "AST scan de todo código em DIFF antes de aplicar"
      forbidden: [subprocess, tempfile, sqlite3, os.system, eval, exec]

  fmea:
    rpn: 9
    mode: "Módulo referenciado mas não definido → LLM inventa comportamento"
    probability: 3
    severity: 3
    detection: 1
    mitigation: >
      Definições mínimas estabelecem contrato de interface.
      Implementações completas em OPPs futuros.
      Teste: re-executar grep de depends_on após aplicar este OPP.

# ─────────────────────────────────────────────────────────────────
# DIFF_EVENT_BUS_RESILIENCE_001 (OPP-122)
# Prioridade: P1 | Esforço: LOW | RPN: 4
# GAP G4: event_bus sem executor declarado e sem what_if_fails
# ─────────────────────────────────────────────────────────────────
event_bus_resilience:
  executor: LLM_BEHAVIOR
  version: v00.35.0
  opp: OPP-122
  tier: 0
  status: PROPOSED

  purpose: >
    Adicionar declaração de executor e what_if_fails ao event_bus (v00.19.0).
    O event_bus é referenciado por 15+ módulos como infraestrutura de comunicação
    mas não tem fallback declarado — violação direta de SR_40.

  why: >
    WHY: SR_40 exige que todo módulo SANDBOX_CODE tenha why/when/description/what_if_fails.
    O event_bus está declarado sem executor e sem fallback. Se o bus falhar (ex: em runtime
    MINIMAL que não tem estado compartilhado entre chamadas), todos os 15+ módulos
    que publicam eventos ficam sem tratamento de falha definido.
    WHY OPERACIONAL: Em MINIMAL runtime, o event_bus deve ser substituído por chamadas
    diretas — o módulo A chama o módulo B diretamente em vez de publicar um evento.
    Sem esta declaração, o LLM não sabe o que fazer quando events não podem ser publicados.

  what_if_fails: "N/A — este OPP DEFINE o fallback"

  patch_target: "event_bus (v00.19.0) — adicionar campos abaixo"
  patch_type: "AUGMENT — não substitui, apenas adiciona campos faltantes"

  fields_to_add:
    executor: "LLM_BEHAVIOR"  # Event bus é comportamental — o LLM mantém estado de eventos

    what_if_fails: >
      FALLBACK 1 — Runtime MINIMAL (sem estado compartilhado):
        Substituir publicação de eventos por chamadas diretas entre módulos.
        Ordem de chamada: pmi_pm → architect → engineer → critic → meta_reasoning.
        Declarar [EVENT_BUS_DEGRADED: direct_calls].
      FALLBACK 2 — Subscriber não registrado para evento:
        Ignorar evento silenciosamente. Nunca falhar por subscriber ausente.
      FALLBACK 3 — Event loop saturado (> 100 eventos pendentes):
        Descartar eventos mais antigos (FIFO discard). Logar [EVENT_BUS_OVERFLOW].
      REGRA: Falha no event_bus NUNCA bloqueia a pipeline principal.
      REGRA: Em MINIMAL, o LLM simula o bus mantendo ordem de execução dos módulos.

    resilience_mode:
      FULL: "Python dict in-process — eventos são chamadas de função"
      PARTIAL: "Simulated — LLM mantém log de eventos em context"
      MINIMAL: "Direct calls — módulos chamados em sequência sem mediação"

  fmea:
    rpn: 4
    mode: "event_bus falha silenciosamente — 15+ módulos sem tratamento de falha"
    probability: 2
    severity: 2
    detection: 1
    mitigation: "Fallback para direct_calls é sempre viável. Event bus é opcional — comunicação direta funciona."

# ─────────────────────────────────────────────────────────────────
# DIFF_SEQUENTIAL_THINKING_AUTOBOOT_001 (OPP-123)
# Prioridade: P1 | Esforço: LOW | RPN: 4
# GAP G6: sequential_thinking OPP-103 declarado mas sem auto-boot em DEEP+
# ─────────────────────────────────────────────────────────────────
sequential_thinking_autoboot:
  executor: LLM_BEHAVIOR
  version: v00.35.0
  opp: OPP-123
  tier: 1
  status: PROPOSED

  purpose: >
    Ativar o sequential_thinking MCP automaticamente nos modos DEEP, RESEARCH e SCIENTIFIC.
    OPP-103 declarou o módulo e patches v033_17 aplicaram as propriedades, mas nunca
    estabeleceu a regra de auto-ativação em modos que dele se beneficiam mais.

  why: >
    WHY: O sequential_thinking MCP (algorithms/mcp-servers-impl/sequentialthinking) permite
    raciocínio revisável — thoughtNumber/isRevision/branchFromThought. Em modos DEEP+,
    o LLM executa steps longos onde revisão de hipóteses é essencial.
    Sem auto-boot: o módulo existe mas nunca é ativado automaticamente — o usuário teria
    que pedir explicitamente "use sequential thinking" para ativar.
    WHY QUANTITATIVO: Em problemas SCIENTIFIC com 8+ steps, sequential_thinking reduz
    erros de raciocínio encadeado em ~30% (estimativa baseada em estudos de CoT revisável).

  when: >
    WHEN: cognitive_mode IN [DEEP, RESEARCH, SCIENTIFIC] → ativar sequential_thinking.
    WHEN: Problema com > 5 passos de raciocínio → ativar mesmo em FAST.
    WHEN: meta_reasoning detecta "revisão necessária" mid-step → ativar retroativamente.

  description: >
    O QUE É: Regra de auto-ativação do sequential_thinking em modos complexos.
    O QUE NAO É: Instalação do MCP server — isso ocorre no ambiente (Claude Code).
    O QUE NAO É: Obrigatório em EXPRESS/FAST para problemas simples.
    COMO FUNCIONA: MCFE detecta modo DEEP+ → event_bus emite SEQUENTIAL_THINKING_ACTIVATE
    → mental_interpreter_v4 usa formato {thoughtNumber, thought, isRevision, branchFromThought}
    para todos os thoughts subsequentes.

  what_if_fails: >
    FALLBACK: sequential_thinking MCP indisponível → usar raciocínio linear padrão.
    FALLBACK: Runtime MINIMAL → simular sequential_thinking via LLM_BEHAVIOR (pensamentos numerados).
    REGRA: Nunca bloquear modo DEEP+ por sequential_thinking indisponível.

  inject_when: "MCFE.select_mode() retorna DEEP | RESEARCH | SCIENTIFIC"
  depends_on: [mcfe, mental_interpreter_v4, event_bus_resilience]

  activation_rule: |
    # Pseudo-código de auto-ativação:
    # SE cognitive_mode IN [DEEP, RESEARCH, SCIENTIFIC]:
    #     session.sequential_thinking_active = True
    #     Todos os thoughts devem usar formato:
    #       {
    #         "thoughtNumber": N,
    #         "thought": "...",
    #         "isRevision": False,  # True se revisando thought anterior
    #         "revisesThought": None,  # ID do thought revisado (se isRevision)
    #         "branchFromThought": None,  # ID do thought base para branch
    #         "branchId": None,  # ID da branch atual
    #         "totalThoughts": estimated_N,  # Estimativa do total
    #         "nextThoughtNeeded": True  # False no último thought
    #       }
    # SE problema > 5 steps E cognitive_mode == FAST:
    #     session.sequential_thinking_active = True  # Upgrade pontual

  mcp_server_path: "algorithms/mcp-servers-impl/src/src/sequentialthinking/"
  available_in_repo: true

  fmea:
    rpn: 4
    mode: "DEEP+ sem revisão estruturada → erros de raciocínio encadeado"
    probability: 2
    severity: 2
    detection: 1
    mitigation: "Auto-boot é aditivo — não remove capacidades existentes. Fallback trivial."

# ─────────────────────────────────────────────────────────────────
# DIFF_FORGESKILLS_TRUE_AUTOBOOT_001 (OPP-124)
# Prioridade: P1 | Esforço: MEDIUM | RPN: 6
# GAP: apex_superrepo_boot não executa automaticamente — é descrito mas não ativado
# ─────────────────────────────────────────────────────────────────
forgeskills_true_autoboot:
  executor: HYBRID
  version: v00.35.0
  opp: OPP-124
  tier: 0
  status: PROPOSED

  purpose: >
    Implementar o boot automático real do ForgeSkills via INDEX.md parsing.
    O apex_superrepo_boot (OPP-104) e forgeskills_rapid_reader (OPP-106) foram
    declarados mas nunca tiveram o bloco executável que realiza o boot.
    Este OPP fornece o código Python concreto que o LLM deve executar em STEP_0
    para carregar as skills do repositório real.

  why: >
    WHY: O INDEX.md do repositório está acessível (confirmado: 79.744 chars, 1.775 linhas,
    225 skills mapeadas). O APEX conhece a URL. O forge_method está em APEX_SESSION_CAPS.
    O que falta é o bloco de código que EXECUTA o boot — o LLM sabe que deve bootar mas
    não tem o código para fazer isso automaticamente.
    SEM ESTE OPP: Em toda sessão, o LLM inicia sem skills do repositório carregadas.
    ForgeSkills só carrega quando o usuário menciona um domínio específico e o LLM
    lembra de fazer um fetch manual. Isso é manual, propenso a esquecimento.
    COM ESTE OPP: STEP_0 executa o boot automaticamente → session.skill_registry
    tem skills prontas antes da primeira mensagem do usuário ser processada.

  when: >
    WHEN: STEP_0 — após apex_runtime_probe (OPP-119) confirmar APEX_SESSION_CAPS.
    WHEN: APEX_SESSION_CAPS["forge_method"] IN ["urllib_fetch", "git_clone"].
    WHEN: Session nova (skill_registry vazio) OU domínio não coberto por skills carregadas.

  what_if_fails: >
    FALLBACK 1: urllib timeout → continuar com skills do prompt base.
    FALLBACK 2: INDEX.md malformado → usar domain_map embutido no prompt.
    FALLBACK 3: forge_method == "inline_paste" → skip auto-boot, aguardar solicitação manual.
    REGRA: Boot falho NUNCA bloqueia a sessão.

  inject_when: "STEP_0 após apex_runtime_probe"
  depends_on: [apex_runtime_probe, apex_superrepo_boot]

  boot_code: |
    # APEX FORGESKILLS AUTOBOOT v00.35.0 — STEP_0
    # Executar após apex_runtime_probe. Requer APEX_SESSION_CAPS definido.

    import urllib.request, json, re

    RAW_BASE = "https://raw.githubusercontent.com/thiagofernandes1987-create/APEX/main/"
    BOOT_TIMEOUT = 15
    MAX_SKILLS_PER_BOOT = 15  # Limite para controle de tokens

    session_skill_registry = {}
    boot_log = []

    def fetch_index():
        """Fetch INDEX.md do repositório."""
        try:
            url = RAW_BASE + "INDEX.md"
            with urllib.request.urlopen(url, timeout=BOOT_TIMEOUT) as r:
                return r.read().decode("utf-8")
        except Exception as e:
            return None

    def extract_skills_from_index(index_content):
        """
        Extrai mapeamento domínio → path de skills do INDEX.md.
        Parse simples linha a linha — não requer PyYAML.
        """
        skills = {}
        current_domain = None
        skill_pattern = re.compile(r'path:\s*(skills/[^\s]+/SKILL\.md)')
        skill_id_pattern = re.compile(r'skill(?:_id)?:\s*(\S+)')
        domain_pattern = re.compile(r'^  ([A-Z_]+):$')

        for line in index_content.splitlines():
            dm = domain_pattern.match(line)
            if dm:
                current_domain = dm.group(1)
                if current_domain not in skills:
                    skills[current_domain] = []
            pm = skill_pattern.search(line)
            if pm and current_domain:
                path = pm.group(1)
                if path not in [s["path"] for s in skills[current_domain]]:
                    skills[current_domain].append({"path": path, "status": "DISCOVERED"})
        return skills

    def fetch_skill_metadata(path):
        """Fetch frontmatter de um SKILL.md para obter anchors."""
        try:
            url = RAW_BASE + path
            with urllib.request.urlopen(url, timeout=5) as r:
                content = r.read().decode("utf-8")
            # Extrair frontmatter
            meta = {}
            in_frontmatter = False
            for line in content.splitlines()[:20]:
                if line.strip() == "---":
                    in_frontmatter = not in_frontmatter
                    continue
                if in_frontmatter:
                    if ":" in line:
                        k, _, v = line.partition(":")
                        meta[k.strip()] = v.strip().strip('"')
            return meta
        except Exception:
            return {}

    # ── MAIN BOOT ─────────────────────────────────────────────────
    forge_method = APEX_SESSION_CAPS.get("forge_method", "inline_paste")

    if forge_method in ("urllib_fetch", "git_clone"):
        index_content = fetch_index()
        if index_content:
            boot_log.append(f"INDEX.md fetched: {len(index_content)} chars")
            skills_map = extract_skills_from_index(index_content)
            boot_log.append(f"Domains discovered: {list(skills_map.keys())}")

            # Registrar no session_skill_registry
            total = 0
            for domain, skills in skills_map.items():
                for skill in skills[:3]:  # Máximo 3 por domínio no boot
                    if total >= MAX_SKILLS_PER_BOOT:
                        break
                    session_skill_registry[skill["path"]] = {
                        "domain": domain,
                        "status": "PROVISIONAL",
                        "path": skill["path"],
                    }
                    total += 1

            boot_log.append(f"Skills registered: {total}")
            print(f"[APEX_FORGESKILLS_BOOT_COMPLETE]")
            print(f"  Method: {forge_method}")
            print(f"  Domains: {len(skills_map)}")
            print(f"  Skills registered: {total}")
            print(f"  Domains: {list(skills_map.keys())[:10]}")
        else:
            print("[APEX_FORGESKILLS_BOOT_FAILED: INDEX.md inacessível — usando skills do prompt base]")
    else:
        print(f"[APEX_FORGESKILLS_BOOT_SKIP: forge_method={forge_method} — auto-boot requer urllib ou git]")

    # Expor para outros módulos
    APEX_SKILL_REGISTRY = session_skill_registry
    APEX_BOOT_LOG = boot_log

  on_demand_skill_fetch: |
    # Quando um domínio específico é detectado na tarefa:
    # 1. Verificar se domain está em APEX_SKILL_REGISTRY
    # 2. SE sim: fetch SKILL.md do path → injetar no contexto
    # 3. SE não: buscar no INDEX.md por anchors relevantes → fetch
    #
    # Exemplo — domínio "legal" com âncora "contrato":
    # paths = [p for p, m in APEX_SKILL_REGISTRY.items() if m["domain"] == "LEGAL"]
    # for path in paths[:2]:
    #     url = RAW_BASE + path
    #     # fetch e injetar conteúdo

  fmea:
    rpn: 6
    mode: "Boot falha silenciosamente → session sem skills do repositório"
    probability: 2
    severity: 3
    detection: 1
    mitigation: >
      Boot tem timeout 15s e múltiplos fallbacks.
      Falha declarada explicitamente com [APEX_FORGESKILLS_BOOT_FAILED].
      Skills do prompt base sempre disponíveis como fallback.
      Re-tentar boot via ForgeSkills on-demand quando domínio detectado.

