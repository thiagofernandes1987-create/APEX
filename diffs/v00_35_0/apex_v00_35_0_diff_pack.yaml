# ─────────────────────────────────────────────────────────────────
# DIFF_RUNTIME_PROBE_BLOCK_001 (OPP-119)
# Prioridade: P0 | Esforço: HIGH | RPN: 16
# GAP G2: Sem bloco Python executável no STEP_0 — detecção é declarativa, não real
# ─────────────────────────────────────────────────────────────────
apex_runtime_probe:
  executor: SANDBOX_CODE
  version: v00.35.0
  opp: OPP-119
  tier: 0
  status: PROPOSED

  purpose: >
    Inserir um bloco Python executável no STEP_0 que realiza sondagem REAL das
    capacidades do runtime, armazenando resultados em session.capabilities.
    Elimina a detecção declarativa (YAML interpretation) em favor de prova empírica:
    o LLM tenta executar e observa o resultado — exatamente como o runtime faz.

  why: >
    WHY: O multi_sandbox_profiles (OPP-110) descreve como detectar runtimes em YAML,
    mas NUNCA executa nenhum código. O LLM lê a descrição e ASSUME qual perfil é ativo
    baseado em raciocínio textual — o mesmo raciocínio probabilístico que o APEX tenta
    superar com SANDBOX_CODE. Resultado: em DeepSeek, o LLM pode assumir MINIMAL quando
    deveria ser FULL_DEEPSEEK porque nunca tentou @python numpy.__version__.
    Em Claude Code, pode assumir PARTIAL se a ferramenta Bash não foi usada ainda.
    A detecção real requer EXECUÇÃO, não interpretação.
    WHY CRÍTICO: Todos os módulos SANDBOX_CODE dependem do profile correto. Profile errado
    = todos os módulos operam no perfil errado. Este é o ponto de falha raiz de toda a
    integração multi-LLM.

  when: >
    WHEN: STEP_0 — OBRIGATÓRIO, antes de qualquer módulo SANDBOX_CODE ou decisão de perfil.
    WHEN: Cada nova sessão (não persistido entre sessões por padrão).
    WHEN: Após mudança detectada de ambiente (subprocess não funcionava, agora funciona).

  description: >
    O QUE É: Bloco Python autoexecutável de diagnóstico que testa 9 capacidades reais.
    O QUE NAO É: Teste de corretude de código gerado — é sondagem de capacidades do ambiente.
    O QUE NAO É: Substituição do multi_sandbox_profiles — é o mecanismo de detecção real
    que o multi_sandbox_profiles descreve mas não implementa.
    COMO FUNCIONA: Executar o bloco probe → capturar resultados → mapear para profile →
    armazenar em session.capabilities → todos os módulos consultam session.capabilities.
    RESULTADO: [APEX_RUNTIME_PROBE_COMPLETE: {profile} | caps: {summary}]

  what_if_fails: >
    FALLBACK 1: Bloco probe falha totalmente → assumir MINIMAL (safe default).
    FALLBACK 2: Sondagem parcial → usar capacidades confirmadas + desativar não confirmadas.
    REGRA: NUNCA falhar sessão por falha de probe. Probe é diagnóstico, não requisito.
    REGRA: Em caso de dúvida → profile menos capaz (mais seguro).

  inject_when: "STEP_0 — antes de todos os outros módulos"
  position: "PRIMEIRO bloco executado em qualquer sessão APEX"

  probe_code: |
    # ═══════════════════════════════════════════════════════════════════
    # APEX RUNTIME PROBE v00.35.0 — STEP_0 MANDATÓRIO
    # Execute este bloco no início de cada sessão para detectar capacidades reais.
    # ═══════════════════════════════════════════════════════════════════
    import sys, json, time

    caps = {
        "python_exec": True,  # Se chegou aqui, Python executou
        "numpy": False,
        "scipy": False,
        "pandas": False,
        "sympy": False,
        "sklearn": False,
        "matplotlib": False,
        "sqlite3": False,
        "subprocess": False,
        "git_available": False,
        "urllib_internet": False,
        "ThreadPoolExecutor": False,
        "orjson": False,
        "ast_module": False,
    }

    # 1. Scientific libraries
    try:
        import numpy as np; caps["numpy"] = np.__version__
    except ImportError: pass

    try:
        import scipy; caps["scipy"] = scipy.__version__
    except ImportError: pass

    try:
        import pandas as pd; caps["pandas"] = pd.__version__
    except ImportError: pass

    try:
        import sympy; caps["sympy"] = sympy.__version__
    except ImportError: pass

    try:
        from sklearn import __version__ as skv; caps["sklearn"] = skv
    except ImportError: pass

    try:
        import matplotlib; caps["matplotlib"] = matplotlib.__version__
    except ImportError: pass

    # 2. System capabilities
    try:
        import sqlite3
        conn = sqlite3.connect(":memory:")
        conn.execute("CREATE TABLE t (x INTEGER)"); conn.close()
        caps["sqlite3"] = True
    except Exception: pass

    try:
        import subprocess
        r = subprocess.run([sys.executable, "-c", "print('ok')"],
                          capture_output=True, timeout=3, text=True)
        caps["subprocess"] = (r.stdout.strip() == "ok")
    except Exception: pass

    try:
        import subprocess
        r = subprocess.run(["git", "--version"], capture_output=True, timeout=3, text=True)
        caps["git_available"] = r.returncode == 0
    except Exception: pass

    # 3. Concurrency
    try:
        from concurrent.futures import ThreadPoolExecutor
        with ThreadPoolExecutor(max_workers=2) as ex:
            f = ex.submit(lambda: 42)
        caps["ThreadPoolExecutor"] = (f.result() == 42)
    except Exception: pass

    # 4. Optional high-perf
    try:
        import orjson; caps["orjson"] = True
    except ImportError: pass

    # 5. AST (para UCO)
    try:
        import ast
        tree = ast.parse("x = 1 + 2")
        caps["ast_module"] = True
    except Exception: pass

    # 6. Internet (urllib — sem instalar nada)
    try:
        import urllib.request
        with urllib.request.urlopen("https://httpbin.org/get", timeout=5) as r:
            caps["urllib_internet"] = (r.status == 200)
    except Exception: pass

    # ── Profile mapping ──────────────────────────────────────────────
    def detect_profile(c):
        if c["subprocess"] and c["sqlite3"] and c["git_available"]:
            return "FULL_CLAUDE_CODE"
        elif c["numpy"] and not c["subprocess"]:
            # DeepSeek vs Grok vs ChatGPT CI
            if c["sqlite3"]:  # ChatGPT CI tem file persistence
                return "PARTIAL_CHATGPT_CI"
            elif c["ThreadPoolExecutor"]:
                return "FULL_DEEPSEEK"  # numpy + threads, sem subprocess
            else:
                return "PARTIAL_GEMINI"
        elif c["numpy"] and c["subprocess"] and not c["sqlite3"]:
            return "FULL_GROK"
        else:
            return "MINIMAL"

    profile = detect_profile(caps)
    sci_libs = [k for k in ["numpy","scipy","pandas","sympy","sklearn","matplotlib"] if caps[k]]

    result = {
        "apex_probe_version": "v00.35.0",
        "profile": profile,
        "capabilities": caps,
        "sci_libs_available": sci_libs,
        "uco_executable": caps["ast_module"],
        "pot_real": caps["python_exec"],
        "forge_method": (
            "git_clone" if caps["git_available"] else
            "urllib_fetch" if caps["urllib_internet"] else
            "inline_paste"
        ),
        "snapshot_method": "sqlite3" if caps["sqlite3"] else "memory_dict",
    }

    # ── Output ─────────────────────────────────────────────────────
    print(f"[APEX_RUNTIME_PROBE_COMPLETE]")
    print(f"Profile: {profile}")
    print(f"Sci libs: {sci_libs}")
    print(f"subprocess: {caps['subprocess']} | sqlite3: {caps['sqlite3']} | git: {caps['git_available']}")
    print(f"UCO executable: {caps['ast_module']} | PoT real: {caps['python_exec']}")
    print(f"Forge method: {result['forge_method']} | Snapshot: {result['snapshot_method']}")
    print(f"Internet: {caps['urllib_internet']} | ThreadPoolExecutor: {caps['ThreadPoolExecutor']}")

    # Salvar em variável de sessão (acessível por outros módulos nesta execução)
    APEX_SESSION_CAPS = result
    # ═══════════════════════════════════════════════════════════════════

  deepseek_activation: |
    # Para DeepSeek: usar @sandbox antes do bloco
    # @sandbox
    # [colar probe_code acima]
    #
    # Para Claude Code: executar via Bash tool ou diretamente em Python
    # Para outros: ```python ... ```

  session_capabilities_contract:
    APEX_SESSION_CAPS:
      profile: "str — FULL_CLAUDE_CODE | FULL_DEEPSEEK | FULL_GROK | PARTIAL_CHATGPT_CI | PARTIAL_GEMINI | MINIMAL"
      capabilities: "dict — boolean/version por capacidade"
      uco_executable: "bool — True se ast_module disponível (UCO pode rodar em sandbox)"
      pot_real: "bool — True se execução Python real disponível"
      forge_method: "str — git_clone | urllib_fetch | inline_paste"
      snapshot_method: "str — sqlite3 | memory_dict"

  usage_by_modules: |
    # Todos os módulos SANDBOX_CODE devem verificar APEX_SESSION_CAPS antes de executar:
    # if APEX_SESSION_CAPS["profile"] == "MINIMAL":
    #     return "[SIMULATED: LLM_BEHAVIOR_ONLY]"
    # if not APEX_SESSION_CAPS["capabilities"]["numpy"] and needs_numpy:
    #     return "[SANDBOX_PARTIAL: numpy indisponível]"
    # UCO:
    # if not APEX_SESSION_CAPS["uco_executable"]:
    #     return "[UCO_GATE_UNAVAILABLE: ast_module ausente]"

  rules_enforced: [SR_39]
  depends_on: []  # Zero dependências — é o primeiro a executar

  fmea:
    rpn: 16
    mode: "Profile incorreto por falha de probe → todos SANDBOX_CODE operam com perfil errado"
    probability: 2
    severity: 8
    detection: 1
    mitigation: >
      Probe tem 13 testes independentes — falha de 1 não invalida os outros.
      Fallback para MINIMAL é sempre seguro.
      Re-executar probe se usuário reportar comportamento inconsistente.

# ─────────────────────────────────────────────────────────────────
# DIFF_UCO_INLINE_IMPLEMENTATION_001 (OPP-120)
# Prioridade: P0 | Esforço: HIGH | RPN: 16
# GAP G1+G5: uco_v4_analyzer = dependência fantasma + UCO sem Python inline
# ─────────────────────────────────────────────────────────────────
uco_v4_analyzer:
  executor: SANDBOX_CODE
  version: v00.35.0
  opp: OPP-120
  tier: 1
  status: PROPOSED

  purpose: >
    Definir formalmente o módulo uco_v4_analyzer — dependência declarada em
    uco_quality_gate.depends_on mas INEXISTENTE no prompt até v00.34.0.
    Registrar o UCO real (universal_code_optimizer_v4.py — 4.152 linhas) no repositório
    APEX em algorithms/uco/ e fornecer: (1) entry point via ForgeSkills git_clone/urllib,
    (2) implementação Python inline mínima via ast stdlib para runtimes sem acesso ao repo.
    Torna o UCO genuinamente independente do LLM — execução real em sandbox.

  why: >
    WHY: uco_quality_gate (OPP-68) declara depends_on: [uco_v4_analyzer] mas esse módulo
    nunca foi definido. Resultado: quando o LLM tenta chamar uco_quality_gate.gate(),
    está simulando as métricas AST via LLM_BEHAVIOR — exatamente o contrário do objetivo.
    O UCO existe para ser a fonte de avaliação INDEPENDENTE do LLM (zero influência
    probabilística). Sem implementação real, é circular: LLM avalia código LLM gerou.
    O módulo ast está disponível em todo Python (confirmado pelo probe OPP-119) — custo
    de implementação é zero, benefício é máximo: UCO real em qualquer runtime Python.
    WHY CRÍTICO: SR_33 exige que gate() seja chamado antes de todo PoT em DEEP+.
    Sem uco_v4_analyzer definido, SR_33 é impossível de cumprir honestamente.

  when: >
    WHEN: Toda vez que uco_quality_gate.gate() é invocado.
    WHEN: cognitive_mode IN [DEEP, RESEARCH, SCIENTIFIC] + PoT gerado.
    WHEN: APEX_SESSION_CAPS["uco_executable"] == True (ast_module disponível).

  uco_real_file:
    repository_path: "algorithms/uco/universal_code_optimizer_v4.py"
    raw_url: "https://raw.githubusercontent.com/thiagofernandes1987-create/APEX/main/algorithms/uco/universal_code_optimizer_v4.py"
    lines: 4152
    size_kb: 170
    entry_class: "UniversalCodeOptimizer"
    key_methods:
      analyze:        "analyze(code, language_hint=None) -> AnalysisResult — AST+Halstead+CFG"
      quick_optimize: "quick_optimize(code) -> EngineOutput — Greedy sem numpy (~50ms)"
      optimize_fast:  "optimize_fast(code, n_steps=50) -> EngineOutput — SA com numpy"
      optimize:       "optimize(code) -> EngineOutput — HMC completo (requer numpy)"
    numpy_required: "APENAS para optimize() HMC. quick_optimize() e analyze() = stdlib only"
    availability:
      FULL_CLAUDE_CODE:    "git_clone algorithms/uco/ → import → uco.quick_optimize()"
      FULL_DEEPSEEK:       "urllib_fetch raw_url → exec() inline → uco.quick_optimize()"
      FULL_GROK:           "urllib_fetch raw_url → exec() inline"
      PARTIAL_CHATGPT_CI:  "file_upload universal_code_optimizer_v4.py → import"
      MINIMAL:             "Usar implementação inline (ast stdlib) abaixo"

  description: >
    O QUE É: Dois modos de execução — (1) UCO REAL: universal_code_optimizer_v4.py
    (4.152 linhas) carregado via ForgeSkills do repositório — AST+CFG+DSM+Halstead+9 transforms.
    (2) UCO INLINE: implementação mínima ast stdlib para runtimes sem acesso ao repo.
    O QUE NAO É: Análise de tipos (requer mypy) ou verificação semântica.
    MODO PREFERENCIAL: UCO REAL via algoritmo completo (ForgeSkills fetch em STEP_0).
    MODO FALLBACK: UCO INLINE (ast stdlib) quando repo inacessível.
    LATÊNCIA UCO REAL: quick_optimize() < 50ms para PoT < 100 linhas (sem numpy).
    LATÊNCIA UCO INLINE: < 10ms (apenas ast parse).

  what_if_fails: >
    FALLBACK: APEX_SESSION_CAPS["uco_executable"] == False → declarar [UCO_GATE_UNAVAILABLE].
    FALLBACK: SyntaxError no código PoT → REJECTED imediato com feedback.
    REGRA: Nunca simular resultado do UCO se uco_executable == False. Declarar honestamente.

  inject_when: "uco_quality_gate.gate() invocado"
  depends_on: [apex_runtime_probe]  # Precisa do probe para saber se ast disponível

  python_implementation: |
    # UCO v4 Inline — Análise AST real para APEX PoT programs
    # Disponível em qualquer Python com ast (stdlib).

    import ast
    import re

    class UCOv4Analyzer:
        """UCO v4 — AST-based code analyzer para APEX PoT programs."""

        def analyze(self, code: str) -> dict:
            """
            Analisa código Python via AST.
            Retorna métricas Halstead simplificadas + riscos estruturais.
            """
            result = {
                "syntax_ok": False,
                "H": 0.0,           # Halstead complexity (simplificado)
                "loop_risk": 0.0,   # Fração de loops sem break/return/limit
                "dead_code": 0,     # Statements após return/raise
                "bugs": 0.0,        # Estimativa de bugs por Halstead
                "issues": [],       # Lista de problemas encontrados
                "line_count": len(code.splitlines()),
            }

            try:
                tree = ast.parse(code)
                result["syntax_ok"] = True
            except SyntaxError as e:
                result["issues"].append(f"SyntaxError: {e}")
                return result

            # 1. Halstead simplificado: contar operadores e operandos
            operators = set()
            operands = set()
            op_count = 0
            operand_count = 0

            for node in ast.walk(tree):
                if isinstance(node, ast.BinOp):
                    op = type(node.op).__name__
                    operators.add(op); op_count += 1
                elif isinstance(node, ast.Compare):
                    for cmp in node.ops:
                        op = type(cmp).__name__
                        operators.add(op); op_count += 1
                elif isinstance(node, ast.BoolOp):
                    operators.add(type(node.op).__name__); op_count += 1
                elif isinstance(node, ast.Name):
                    operands.add(node.id); operand_count += 1
                elif isinstance(node, ast.Constant):
                    operands.add(str(node.value)); operand_count += 1

            n1, n2 = len(operators), len(operands)
            N1, N2 = op_count, operand_count
            N = N1 + N2
            n = n1 + n2

            if n > 0 and N > 0:
                import math
                V = N * math.log2(n) if n > 1 else N
                result["H"] = round(V / 10, 1)  # Escala APEX: H = V/10
                D = (n1 / 2) * (N2 / n2) if n2 > 0 else 0
                result["bugs"] = round(V / 3000, 3)  # Halstead bug estimate

            # 2. Loop risk — loops sem limite claro
            loops = 0
            risky_loops = 0
            for node in ast.walk(tree):
                if isinstance(node, (ast.While, ast.For)):
                    loops += 1
                    # While True sem break interno é risco
                    if isinstance(node, ast.While):
                        is_while_true = (
                            isinstance(node.test, ast.Constant) and node.test.value == True
                            or isinstance(node.test, ast.Name) and node.test.id == "True"
                        )
                        has_break = any(isinstance(n, ast.Break) for n in ast.walk(node))
                        has_return = any(isinstance(n, ast.Return) for n in ast.walk(node))
                        if is_while_true and not has_break and not has_return:
                            risky_loops += 1
                            result["issues"].append("while True sem break/return (risco de loop infinito)")

            result["loop_risk"] = round(risky_loops / loops, 2) if loops > 0 else 0.0

            # 3. Dead code — statements após return/raise no mesmo bloco
            dead = 0
            for node in ast.walk(tree):
                if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.Module)):
                    body = node.body
                    for i, stmt in enumerate(body):
                        if isinstance(stmt, (ast.Return, ast.Raise)) and i < len(body) - 1:
                            dead += len(body) - i - 1
                            result["issues"].append(f"Dead code: {len(body)-i-1} statements após return/raise")
                            break
            result["dead_code"] = dead

            return result

        def gate(self, pot_code: str, cognitive_mode: str,
                 claimed_confidence: float = None) -> dict:
            """
            Gate principal — analisa e decide PASS | AUTO_FIXED | REJECTED.
            Retorna dict com decision, code (possivelmente otimizado), métricas, feedback.
            """
            thresholds = {
                "EXPRESS":    {"H": 50, "loop": 0.30, "dead": 5,  "bugs": 2.0},
                "FAST":       {"H": 30, "loop": 0.20, "dead": 3,  "bugs": 1.5},
                "DEEP":       {"H": 20, "loop": 0.10, "dead": 1,  "bugs": 1.0},
                "RESEARCH":   {"H": 15, "loop": 0.05, "dead": 0,  "bugs": 0.5},
                "SCIENTIFIC": {"H": 10, "loop": 0.00, "dead": 0,  "bugs": 0.3},
            }
            t = thresholds.get(cognitive_mode, thresholds["FAST"])
            metrics = self.analyze(pot_code)

            if not metrics["syntax_ok"]:
                return {
                    "decision": "REJECTED",
                    "code": pot_code,
                    "uco_metrics": metrics,
                    "uco_feedback": f"[UCO_GATE: SyntaxError pré-execução] {metrics['issues']}",
                }

            violations = []
            if metrics["H"] > t["H"]:
                violations.append(f"H={metrics['H']:.1f} > threshold {t['H']} ({cognitive_mode})")
            if metrics["loop_risk"] > t["loop"]:
                violations.append(f"loop_risk={metrics['loop_risk']:.2f} > {t['loop']}")
            if metrics["dead_code"] > t["dead"]:
                violations.append(f"dead_code={metrics['dead_code']} > {t['dead']}")
            if metrics["bugs"] > t["bugs"]:
                violations.append(f"bugs≈{metrics['bugs']:.3f} > {t['bugs']}")

            # Penalidade de confiança
            penalty = 0
            if metrics["bugs"] >= 3:   penalty += 20
            elif metrics["bugs"] >= 1: penalty += 10
            elif metrics["bugs"] >= 0.5: penalty += 5
            if metrics["H"] >= 50:   penalty += 15
            elif metrics["H"] >= 20: penalty += 8
            elif metrics["H"] >= 10: penalty += 3
            if metrics["loop_risk"] > 0.4: penalty += 15

            adj_confidence = None
            if claimed_confidence is not None:
                adj_confidence = max(0, claimed_confidence - penalty)

            confidence_label = (
                f" [UCO_CAL: H={metrics['H']:.1f}, bugs≈{metrics['bugs']:.3f},"
                f" adj_conf={adj_confidence}]"
            ) if adj_confidence is not None else (
                f" [UCO_CAL: H={metrics['H']:.1f}, bugs≈{metrics['bugs']:.3f}]"
            )

            if not violations:
                return {
                    "decision": "PASS",
                    "code": pot_code,
                    "uco_metrics": metrics,
                    "uco_feedback": f"[UCO_GATE_PASS]{confidence_label}",
                }

            # AUTO_FIX: tentar remover dead code
            fixed_code = self._remove_dead_code(pot_code)
            fixed_metrics = self.analyze(fixed_code)
            remaining_violations = [
                v for v in violations
                if not ("dead_code" in v and fixed_metrics["dead_code"] <= t["dead"])
            ]
            if len(remaining_violations) < len(violations):
                return {
                    "decision": "AUTO_FIXED",
                    "code": fixed_code,
                    "uco_metrics": fixed_metrics,
                    "uco_feedback": (
                        f"[UCO_GATE_AUTO_FIXED]{confidence_label} "
                        f"Dead code removido. Violations restantes: {remaining_violations}"
                    ),
                }

            return {
                "decision": "REJECTED",
                "code": pot_code,
                "uco_metrics": metrics,
                "uco_feedback": (
                    f"[UCO_GATE_REJECTED]{confidence_label} "
                    f"Violations: {violations}. "
                    f"Issues: {metrics['issues']}. "
                    f"Regenerar com: reduzir complexidade (H<{t['H']}), "
                    f"eliminar loops sem limite, remover dead code."
                ),
            }

        def _remove_dead_code(self, code: str) -> str:
            """Remove statements óbvios após return/raise."""
            try:
                tree = ast.parse(code)
                lines = code.splitlines()
                dead_lines = set()
                for node in ast.walk(tree):
                    if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                        body = node.body
                        for i, stmt in enumerate(body):
                            if isinstance(stmt, (ast.Return, ast.Raise)):
                                for dead in body[i+1:]:
                                    if hasattr(dead, 'lineno'):
                                        dead_lines.add(dead.lineno)
                return "\n".join(
                    l for i, l in enumerate(lines, 1)
                    if i not in dead_lines
                )
            except Exception:
                return code  # Retornar original se falhar

    # Instância global para uso por uco_quality_gate
    _UCO_INSTANCE = UCOv4Analyzer()

    def uco_gate(pot_code, cognitive_mode, claimed_confidence=None):
        """Entry point para uco_quality_gate.gate()"""
        return _UCO_INSTANCE.gate(pot_code, cognitive_mode, claimed_confidence)

  loading_protocol: |
    # PASSO 1: Verificar se UCO real está disponível
    # if APEX_SESSION_CAPS["forge_method"] in ("git_clone", "urllib_fetch"):
    #
