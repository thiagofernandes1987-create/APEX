        team-configurator:
          role: "Configurar equipe de agentes para problemas complexos"
          activates_when: [multi_agent, complex_problem, agent_selection]
          model: sonnet

  activation_protocol: |
    # STEP_1 (pmi_pm) detecta domínio → meta_reasoning verifica roster:
    # 1. Extrair domínio primário da tarefa
    # 2. Verificar se algum agente base (architect, engineer, etc.) tem expertise primária
    # 3. SE não: buscar em community_roster por activates_when match
    # 4. SE match: emitir [COMMUNITY_AGENT_ACTIVATED: {agent_name} | domain: {domain}]
    # 5. Agente community recebe [PARTITION_ACTIVE: {role}] e executa em STEP_N
    # 6. Output integrado ao pipeline como qualquer agente base
    # MAX 2 community agents: 1 domain expert + 1 orchestrator (se necessário)

  fmea:
    rpn: 2
    mode: "Community agent ativado incorretamente — expertise não match real"
    probability: 1
    severity: 2
    detection: 1
    mitigation: >
      activates_when é específico (ex: [fastapi, pydantic, async_python]).
      meta_reasoning valida match antes de ativar.
      Agentes base sempre disponíveis como fallback.

# ─────────────────────────────────────────────────────────────────
# DIFF_POT_SANDBOX_UNIFICATION_001 (OPP-117)
# Prioridade: P0 | Esforço: MEDIUM | RPN: 6
# AUDIT GAP: PoT Engine emite código Python sem sintaxe específica por runtime
# ─────────────────────────────────────────────────────────────────
pot_sandbox_unification:
  executor: LLM_BEHAVIOR
  version: v00.34.0
  opp: OPP-117
  tier: 0
  status: PROPOSED

  purpose: >
    Garantir que o PoT Engine emita código Python com a sintaxe de ativação correta
    para o runtime detectado no STEP_0, eliminando o gap onde código gerado para
    Claude Code não funciona em DeepSeek (falta @sandbox) ou vice-versa.
    Unificar: output do PoT sempre inclui o prefixo/marker correto para o runtime ativo.

  why: >
    WHY: O PoT Engine (OPP-67, OPP-MAS-B1) gera blocos ```python ... ``` que funcionam
    em Claude Code mas NÃO ativam o sandbox do DeepSeek (requer @sandbox/@python).
    Em ChatGPT Code Interpreter, o bloco ```python``` é suficiente.
    Em Grok Aurora, similar ao Claude.
    Sem unificação: o mesmo APEX rodando em DeepSeek gera código que não executa,
    tornando TODOS os módulos SANDBOX_CODE ineficazes naquele runtime.
    Esse é o gap mais impactante para multi-LLM deployment do APEX.

  when: "STEP_3 (PoT generation) — SEMPRE que gerar bloco Python para execução"

  description: >
    O QUE É: Wrapper de sintaxe de código — o PoT Engine injeta prefixo correto
    baseado no sandbox_profile detectado no STEP_0.
    O QUE NÃO É: Mudança na lógica do código — apenas no formato de apresentação.
    COMO FUNCIONA: STEP_0 → detectar profile → salvar em session.sandbox_profile →
    STEP_3 PoT generation → consultar session.sandbox_profile → emitir com prefixo correto.

  what_if_fails: >
    FALLBACK: Emitir sem prefixo (```python ... ```) — funciona em maioria dos runtimes.
    REGRA: NUNCA falhar por não saber o prefixo — usar default sem prefixo.

  inject_when: "PoT Engine gera qualquer bloco Python para execução"
  depends_on: [multi_sandbox_profiles, pot_engine]

  syntax_by_profile:
    FULL_CLAUDE_CODE: |
      ```python
      {codigo}
      ```
    FULL_DEEPSEEK: |
      @sandbox
      ```python
      {codigo}
      ```
    FULL_GROK: |
      ```python
      {codigo}
      ```
    PARTIAL_CHATGPT_CI: |
      ```python
      {codigo}
      ```
    PARTIAL_GEMINI: |
      ```python
      {codigo}
      ```
    MINIMAL: |
      [SIMULATED — código abaixo seria executado em runtime com sandbox:]
      ```python
      {codigo}
      ```

  deepseek_library_activation: |
    # DeepSeek: além de @sandbox, pode ativar libs específicas:
    # @numpy → import numpy as np (pré-ativado)
    # @pandas → import pandas as pd (pré-ativado)
    # @matplotlib → import matplotlib.pyplot as plt (pré-ativado)
    # @scipy → from scipy import ... (pré-ativado)
    # @sympy → from sympy import ... (pré-ativado)
    # @sklearn → from sklearn import ... (pré-ativado)
    #
    # APEX comportamento no DeepSeek:
    # Monte Carlo → @sandbox com numpy pré-ativado
    # Data analysis → @pandas ou @sandbox
    # Symbolic math → @sympy
    # Scientific computing → @scipy

  output_markers_extended:
    FULL_CLAUDE_CODE: "[POT_EXECUTED: FULL | runtime: Claude Code]"
    FULL_DEEPSEEK:    "[POT_EXECUTED: FULL | runtime: DeepSeek @sandbox | libs: {libs_used}]"
    FULL_GROK:        "[POT_EXECUTED: FULL | runtime: Grok Aurora]"
    PARTIAL_CHATGPT_CI: "[POT_PARTIAL: ChatGPT CI | {modulos_indisponiveis}]"
    PARTIAL_GEMINI:   "[POT_PARTIAL: Gemini Jupyter]"
    MINIMAL:          "[POT_SIMULATED: sem runtime de execução]"

  rules_enforced: [SR_07, SR_39]

  fmea:
    rpn: 6
    mode: "Profile salvo incorretamente → prefixo errado → código não executa"
    probability: 2
    severity: 3
    detection: 1
    mitigation: >
      session.sandbox_profile imutável após STEP_0.
      POT Engine valida profile antes de emitir.
      Se profile inválido: usar MINIMAL syntax (safe default).

# ─────────────────────────────────────────────────────────────────
# DIFF_MARKETPLACE_SKILL_FORGE_001 (OPP-118) [BONUS]
# Prioridade: P2 | Esforço: LOW | RPN: 2
# AUDIT GAP: Anthropic Marketplace (marketplace.json) não integrado ao skill discovery
# ─────────────────────────────────────────────────────────────────
marketplace_skill_forge:
  executor: LLM_BEHAVIOR
  version: v00.34.0
  opp: OPP-118
  tier: 2
  status: PROPOSED

  purpose: >
    Integrar o sistema de Marketplace do Claude (marketplace.json) ao SkillIndexer
    para descoberta de skills via catálogo oficial Anthropic, complementando o
    ForgeSkills raw GitHub fetch.

  why: >
    WHY: O arquivo .claude-plugin/marketplace.json em múltiplos repos define bundles
    de skills que podem ser instalados como um grupo. Por exemplo, o skills-main tem
    bundles: document-skills (xlsx+docx+pptx+pdf), example-skills (12 skills), claude-api.
    O APEX não conhece esse sistema de bundles — trata skills individualmente.
    Conhecer os bundles permite: ativar conjunto coerente de skills com uma âncora
    (ex: "document processing" → ativa bundle document-skills via Skills API ou clone).

  when: >
    WHEN: DynamicSkillForge detecta skill_id com prefixo "bundle:"
    WHEN: Usuário solicita capacidade que mapeie para bundle conhecido.

  what_if_fails: "Skill discovery individual como fallback"
  inject_when: "SkillIndexer.discover() + apex_superrepo_boot"
  depends_on: [skills_api_bridge, dynamic_skill_forge]

  known_bundles:
    document_skills:
      bundle_id: "bundle:document-skills"
      skills: [xlsx, docx, pptx, pdf]
      activates_when: [document_processing, spreadsheet, presentation, pdf_analysis]
      source: "anthropic:xlsx, anthropic:docx, anthropic:pptx, anthropic:pdf"

    example_skills:
      bundle_id: "bundle:example-skills"
      skills: [algorithmic-art, canvas-design, frontend-design, mcp-builder, skill-creator,
               webapp-testing, slack-gif-creator, theme-factory, claude-api]
      activates_when: [creative, web_development, mcp_creation, skill_creation]

    claude_api_bundle:
      bundle_id: "bundle:claude-api"
      skills: [claude-api]
      activates_when: [sdk_usage, api_integration, multi_language_sdk]
      description: "SDK multi-linguagem Python/TypeScript/Java para Anthropic API"

    finance_bundle:
      bundle_id: "bundle:financial-services"
      skills: [equity-research, financial-analysis, investment-banking, wealth-management]
      activates_when: [finance, equity_research, investment_banking, financial_analysis]

    knowledge_work_bundle:
      bundle_id: "bundle:knowledge-work"
      skills: [legal, marketing, engineering, hr, sales, data, design, product-management]
      activates_when: [enterprise, knowledge_work, professional_workflow]

  fmea:
    rpn: 2
    mode: "Bundle desatualizado — skills mudaram desde mapeamento"
    probability: 1
    severity: 2
    detection: 1
    mitigation: "marketplace.json fetch dinâmico via apex_superrepo_boot quando possível"

