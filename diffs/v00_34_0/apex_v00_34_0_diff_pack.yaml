# ─────────────────────────────────────────────────────────────────
# DIFF_MULTI_SANDBOX_PROFILES_001 (OPP-110)
# Prioridade: P0 | Esforço: MEDIUM | RPN: 8
# AUDIT GAP: llm_runtime_adapter não detecta DeepSeek, Grok, ChatGPT Code Interpreter
# ─────────────────────────────────────────────────────────────────
multi_sandbox_profiles:
  executor: LLM_BEHAVIOR
  version: v00.34.0
  opp: OPP-110
  tier: 0
  status: PROPOSED

  purpose: >
    Expandir o llm_runtime_adapter (OPP-105) para reconhecer TODOS os runtimes
    com sandbox disponíveis: DeepSeek (@sandbox/@python), ChatGPT Code Interpreter,
    Grok (xAI), Gemini Advanced (Jupyter), Claude Code (FULL), além de LLM puro (MINIMAL).
    Cada perfil define capabilities, sintaxe de ativação e fallback behavior.

  why: >
    WHY: O usuário confirmou que DeepSeek tem sandbox com bibliotecas científicas
    ativadas por @sandbox ou @python ou nome de biblioteca (@numpy, @pandas).
    O OPP-105 atual só detecta FULL (Claude Code) / PARTIAL (GPT-4o/Gemini) / MINIMAL.
    DeepSeek com @sandbox é FULL_DEEPSEEK — tem numpy, scipy, pandas, matplotlib
    pré-instalados, execução real de código, mas NÃO tem subprocess/sqlite3/git.
    Grok (xAI) tem sandbox via Aurora — detectável por tentativa de execução Python.
    ChatGPT Code Interpreter: execução Python real, sem internet, sem subprocess.
    Gemini Advanced: Jupyter kernel, numpy/pandas disponíveis.
    Sem profiles corretos → APEX assume PARTIAL e subutiliza capacidades REAIS do runtime.

  when: >
    WHEN: STEP_0 — SEMPRE, antes de qualquer módulo SANDBOX_CODE.
    Substitui a detecção binária FULL/PARTIAL/MINIMAL por perfil granular.

  description: >
    O QUE É: Sistema de profiles de sandbox com detecção por sondagem + sintaxe de ativação.
    O QUE NÃO É: Identificação por nome do LLM — é detecção por capabilities reais.
    COMO FUNCIONA: Sondagem sequencial por imports → mapear para profile → emitir marker.
    PROFILES ADICIONADOS: FULL_DEEPSEEK, FULL_CHATGPT_CI, FULL_GROK, PARTIAL_GEMINI.
    SINTAXE DEEPSEEK: Prefixar bloco Python com @sandbox ou @python para ativar execução.
    SINTAXE PADRÃO: ```python ... ``` para Claude/GPT/Gemini.

  what_if_fails: >
    FALLBACK 1 — Profile não identificado: assumir PARTIAL (comportamento v00.33.0).
    FALLBACK 2 — Sondagem falha em runtime: continuar com profile MINIMAL.
    REGRA: NUNCA bloquear pipeline por falha de detecção de sandbox.
    REGRA: Em dúvida, assumir profile menos capaz (mais seguro).

  inject_when: "STEP_0 — antes de qualquer módulo SANDBOX_CODE"
  depends_on: [llm_runtime_adapter]
  extends: OPP-105

  sandbox_profiles:
    FULL_CLAUDE_CODE:
      detection: "Bash tool + Read tool + Write tool disponíveis"
      label: "[LLM_RUNTIME: FULL — Claude Code]"
      capabilities:
        python_exec: true
        subprocess: true
        sqlite3: true
        git_clone: true
        filesystem: true
        internet: true
      forgeskills_method: git_clone
      snapshot_method: sqlite3
      activation_syntax: "```python ... ```"
      orjson: available
      ThreadPoolExecutor: available
      notes: "Runtime máximo — todos os módulos SANDBOX_CODE disponíveis"

    FULL_DEEPSEEK:
      detection: >
        Tentativa: executar bloco @python com numpy.version → sucesso.
        Fallback: verificar se @sandbox keyword ativa execução.
      label: "[LLM_RUNTIME: FULL_DEEPSEEK — DeepSeek Sandbox]"
      capabilities:
        python_exec: true
        subprocess: false
        sqlite3: false
        git_clone: false
        filesystem: false
        internet: false
        numpy: true
        scipy: true
        pandas: true
        matplotlib: true
        sympy: true
        sklearn: true
      forgeskills_method: inline_paste
      snapshot_method: memory_dict
      activation_syntax: "@sandbox\n```python ... ```"
      alternate_syntax: "@python\n```python ... ```"
      library_syntax: "@numpy — ativa numpy; @pandas — ativa pandas; etc."
      orjson: unavailable_use_json_stdlib
      ThreadPoolExecutor: available
      notes: >
        DeepSeek R2/V3 com sandbox ativado via @sandbox ou @python.
        Capacidades científicas completas (numpy/scipy/pandas/matplotlib/sympy).
        SEM subprocess, sqlite3, git_clone, filesystem.
        Para APEX: todos módulos SANDBOX_CODE funcionam EXCETO DynamicSkillForge (git_clone)
        e SQLite SnapshotStore → usar memory_dict fallback.
      replacements:
        sqlite3: "dict Python em memória com pickle.dumps() opcional"
        subprocess: "exec() inline com timeout manual"
        git_clone: "inline_paste ou urllib.request para raw_base"
        ThreadPoolExecutor: "concurrent.futures.ThreadPoolExecutor (disponível)"

    FULL_GROK:
      detection: >
        Tentar executar Python simples → se retornar resultado real → FULL_GROK.
        Grok Aurora sandbox: Python real, numpy/pandas, sem subprocess.
      label: "[LLM_RUNTIME: FULL_GROK — xAI Grok Aurora]"
      capabilities:
        python_exec: true
        subprocess: false
        sqlite3: false
        numpy: true
        pandas: true
      forgeskills_method: inline_paste
      snapshot_method: memory_dict
      activation_syntax: "```python ... ```"
      notes: "Grok Aurora sandbox — semelhante ao FULL_DEEPSEEK em capabilities"

    PARTIAL_CHATGPT_CI:
      detection: >
        Python sandbox disponível (code_interpreter tool ativa).
        Sem Bash tool. Sem git. File upload disponível via tool.
      label: "[LLM_RUNTIME: PARTIAL — ChatGPT Code Interpreter]"
      capabilities:
        python_exec: true
        subprocess: false
        sqlite3: false
        git_clone: false
        file_upload: true
        numpy: true
        pandas: true
        matplotlib: true
      forgeskills_method: file_upload_or_paste
      snapshot_method: pickle_file
      activation_syntax: "```python ... ```"
      notes: >
        ChatGPT Code Interpreter: Python real isolado, sem internet, sem subprocess.
        Files podem ser uploadados. Output gráfico via matplotlib disponível.

    PARTIAL_GEMINI:
      detection: "Python sandbox via Gemini Advanced Jupyter kernel"
      label: "[LLM_RUNTIME: PARTIAL — Gemini Advanced]"
      capabilities:
        python_exec: true
        subprocess: false
        numpy: true
        pandas: true
      forgeskills_method: urllib_raw_fetch
      snapshot_method: memory_dict
      activation_syntax: "```python ... ```"

    MINIMAL:
      detection: "Nenhuma execução Python real detectada"
      label: "[LLM_RUNTIME: MINIMAL — LLM puro]"
      capabilities:
        python_exec: false
      forgeskills_method: manual_paste
      sandbox: "todos módulos → LLM_BEHAVIOR"
      prefix_output: "[SIMULATED]"

  detection_algorithm: |
    # STEP_0 — Profile Detection
    def detect_sandbox_profile():
        # 1. Claude Code — ferramentas de sistema disponíveis
        if has_tool("Bash") and has_tool("Read") and has_tool("Write"):
            return "FULL_CLAUDE_CODE"

        # 2. Tentar execução Python real
        test_result = try_execute_python("import numpy; print(numpy.__version__)")
        if test_result.success:
            # Distinguir DeepSeek/Grok/ChatGPT/Gemini
            if detect_deepseek_markers():  # @sandbox ou @python
                return "FULL_DEEPSEEK"
            elif detect_grok_aurora():
                return "FULL_GROK"
            elif has_tool("code_interpreter"):
                return "PARTIAL_CHATGPT_CI"
            else:
                return "PARTIAL_GEMINI"

        # 3. Sem execução real
        return "MINIMAL"

  deepseek_apex_integration: |
    # Como usar APEX com DeepSeek (@sandbox/@python):
    #
    # Para acionar módulos SANDBOX_CODE no DeepSeek:
    # Prefixar SEMPRE com @sandbox antes do bloco Python.
    # O APEX emitirá o código com @sandbox no início.
    #
    # Exemplo — Monte Carlo:
    # @sandbox
    # ```python
    # import numpy as np
    # rng = np.random.default_rng(42)
    # results = rng.normal(100, 15, 10000)
    # print(f"P10={np.percentile(results,10):.1f} P50={np.percentile(results,50):.1f} P90={np.percentile(results,90):.1f}")
    # ```
    #
    # Exemplo — PoT com scipy:
    # @python
    # ```python
    # from scipy import stats
    # ...
    # ```
    #
    # DynamicSkillForge no DeepSeek: usar urllib.request para raw_base em vez de git_clone.
    # SQLite SnapshotStore no DeepSeek: usar dict em memória.

  output_markers:
    FULL_CLAUDE_CODE: "[SANDBOX_EXECUTED: FULL]"
    FULL_DEEPSEEK:    "[SANDBOX_EXECUTED: DEEPSEEK @sandbox]"
    FULL_GROK:        "[SANDBOX_EXECUTED: GROK Aurora]"
    PARTIAL_CHATGPT_CI: "[SANDBOX_PARTIAL: ChatGPT CI]"
    PARTIAL_GEMINI:   "[SANDBOX_PARTIAL: Gemini]"
    MINIMAL:          "[SIMULATED: LLM_BEHAVIOR_ONLY]"

  rules_enforced: [SR_39]

  fmea:
    rpn: 8
    mode: "Profile incorreto → módulo SANDBOX_CODE falha silenciosamente"
    probability: 2
    severity: 4
    detection: 1
    mitigation: >
      try/except em TODA sondagem. Fallback sempre para profile menos capaz.
      Output marcado com profile real detectado. Usuário vê claramente qual runtime ativo.

