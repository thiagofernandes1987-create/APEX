# ─────────────────────────────────────────────────────────────────
# DIFF_FORGESKILLS_CATALOG_BOOT_001 (OPP-112)
# Prioridade: P0 | Esforço: MEDIUM | RPN: 6
# AUDIT GAP: forgeskills_rapid_reader não processa CATALOG.md de MCP nem agent community
# ─────────────────────────────────────────────────────────────────
forgeskills_catalog_boot:
  executor: LLM_BEHAVIOR
  version: v00.34.0
  opp: OPP-112
  tier: 1
  status: PROPOSED

  purpose: >
    Estender o ForgeSkills Rapid Reader (OPP-106) para processar não apenas SKILL.md
    via INDEX.md, mas também: (1) CATALOG.md de domínios de integração (MCP servers),
    (2) AGENT.md da community-awesome, (3) REFERENCE.md de domínios documentados.
    Resultado: APEX boot carrega MCP server URLs diretamente no mcp_bridge registry
    e community agents no dynamic_agent_roster.

  why: >
    WHY: O APEX pós-ingestion tem 80+ MCP server URLs em CATALOG.md files que o LLM
    não sabe usar porque o ForgeSkills só lê SKILL.md.
    Quando usuário pede análise jurídica → APEX deveria auto-carregar GovInfo MCP URL.
    Quando usuário pede física quântica → APEX deveria carregar Qiskit/PsiAnimator.
    Quando usuário pede SEO/marketing → APEX deveria carregar Semrush MCP.
    Isso só é possível se o boot também processa os CATALOG.md e extrai os server URLs.
    Adicionalmente: 33 community agents (code-archaeologist, django-expert, etc.)
    deveriam ser ativados dinamicamente pelo dynamic_skill_forge quando o domínio bate.

  when: >
    WHEN: STEP_0 apex_superrepo_boot — após carregar skills do INDEX.md,
    processar CATALOG.md dos domínios de integração relevantes para a sessão.
    WHEN: DynamicSkillForge detecta domínio sem skill interna → verificar community-awesome.

  description: >
    O QUE É: Extensão do boot pipeline para carregar MCP URLs e community agents.
    O QUE NÃO É: Download completo — apenas metadata (URLs, tool names, capabilities).
    COMO FUNCIONA: INDEX.md → detectar domínios relevantes → fetch CATALOG.md correspondente
    → extrair MCP server URLs → registrar em mcp_bridge.server_registry → disponível.

  what_if_fails: >
    FALLBACK 1 — CATALOG.md indisponível: continuar sem MCP servers do domínio.
    FALLBACK 2 — URL inválida: ignorar e continuar. Logar [MCP_URL_INVALID].
    FALLBACK 3 — community agent AGENT.md malformado: pular. Usar agents base.
    REGRA: Boot NUNCA bloqueia por CATALOG.md indisponível.

  inject_when: "STEP_0 apex_superrepo_boot — estágio 3 (após skills)"
  depends_on: [apex_superrepo_boot, mcp_bridge_v2, forgeskills_rapid_reader]

  catalog_boot_pipeline:
    stage_3_catalog:
      trigger: "Domínio detectado no problema atual"
      domain_to_catalog_map:
        legal:              "integrations/legal-mcp/CATALOG.md"
        contract:           "integrations/legal-mcp/CATALOG.md"
        patents:            "integrations/legal-mcp/CATALOG.md"
        compliance:         "integrations/legal-mcp/CATALOG.md"
        quantum_physics:    "integrations/science-physics-mcp/CATALOG.md"
        quantum_computing:  "integrations/science-physics-mcp/CATALOG.md"
        simulation:         "integrations/science-physics-mcp/CATALOG.md"
        materials:          "integrations/science-physics-mcp/CATALOG.md"
        arxiv:              "integrations/science-physics-mcp/CATALOG.md"
        marketing:          "integrations/marketing-mcp/CATALOG.md"
        seo:                "integrations/marketing-mcp/CATALOG.md"
        google_ads:         "integrations/marketing-mcp/CATALOG.md"
        meta_ads:           "integrations/marketing-mcp/CATALOG.md"
        engineering:        "integrations/engineering-mcp/CATALOG.md"
        nasa:               "integrations/engineering-mcp/CATALOG.md"
        cfd:                "integrations/engineering-mcp/CATALOG.md"
        healthcare:         "integrations/healthcare-plugins/CATALOG.md"
        medicine:           "integrations/healthcare-plugins/CATALOG.md"
        genomics:           "integrations/life-sciences-plugins/CATALOG.md"
        drug_discovery:     "integrations/life-sciences-plugins/CATALOG.md"
        finance:            "integrations/financial-services/CATALOG.md"
        equity_research:    "integrations/financial-services/CATALOG.md"
        investment_banking: "integrations/financial-services/CATALOG.md"

    stage_4_agents:
      community_agents_path: "agents/community-awesome/"
      agent_categories:
        core:         ["code-archaeologist", "code-reviewer", "documentation-specialist", "performance-optimizer"]
        python:       ["django-expert", "fastapi-expert", "ml-data-expert", "python-expert", "testing-expert", "web-scraping-expert"]
        django:       ["django-api-developer", "django-backend-expert", "django-orm-expert"]
        laravel:      ["laravel-backend-expert", "laravel-eloquent-expert"]
        rails:        ["rails-activerecord-expert", "rails-api-developer"]
        orchestrators: ["project-analyst", "team-configurator", "tech-lead-orchestrator"]
      activation_rule: >
        Ativar community agent quando:
        (a) domínio bate com categoria (ex: Django → django-api-developer)
        (b) meta_reasoning detecta que nenhum agente base cobre o domínio
        (c) usuário solicita explicitamente tipo de especialização
      roster_tier: "OPTIONAL — não fazem parte do pipeline base"

  mcp_auto_registration: |
    # Exemplo de extração de MCP URLs de CATALOG.md:
    # Quando domínio == "legal":
    #   fetch: integrations/legal-mcp/CATALOG.md
    #   parse: tabela Markdown com | Server | URL | Coverage |
    #   extrair: {govinfo: "https://api.govinfo.gov/mcp", courtlistener: "github.com/...", ...}
    #   registrar: mcp_bridge.server_registry["legal"] = {govinfo: url, ...}
    #   emitir: [MCP_CATALOG_LOADED: legal — 8 servers registrados]

  rules_enforced: [G6, SR_37]

  fmea:
    rpn: 6
    mode: "CATALOG.md não parseia corretamente — URLs incorretas no mcp_bridge"
    probability: 2
    severity: 3
    detection: 1
    mitigation: "Validar URL com regex antes de registrar. Logar todas as URLs ignoradas."

