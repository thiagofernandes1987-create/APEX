# ─────────────────────────────────────────────────────────────────
# DIFF_SKILLS_API_BRIDGE_001 (OPP-115)
# Prioridade: P1 | Esforço: HIGH | RPN: 8
# AUDIT GAP: API beta.skills.* da Anthropic não integrada ao DynamicSkillForge
# ─────────────────────────────────────────────────────────────────
skills_api_bridge:
  executor: HYBRID
  version: v00.34.0
  opp: OPP-115
  tier: 2
  status: PROPOSED

  purpose: >
    Integrar a Anthropic Skills API (beta.skills.*) ao DynamicSkillForge como
    método alternativo de carregamento de skills — complementando git_clone (FULL),
    urllib_raw_fetch (PARTIAL) e inline_paste (MINIMAL).
    Permite que o APEX: (1) crie skills dinâmicas via API, (2) liste skills disponíveis,
    (3) execute skills via container beta, (4) valide skills antes de publicar.

  why: >
    WHY: O relatório APEX_SKILLS_INTEGRATION_REPORT.md documenta a API completa
    descoberta em skill_utils.py dos cookbooks:
      client.beta.skills.create() → POST /skills
      client.beta.skills.list(source="custom") → GET /skills
      client.beta.skills.retrieve(skill_id) → GET /skills/{id}
      client.beta.skills.versions.create() → nova versão
    Headers obrigatórios: anthropic-beta: "code-execution-2025-08-25,skills-2025-10-02"
    Container skills ativam via: container={"skills": [{"type": "anthropic", "skill_id": "xlsx"}]}
    Esta API existe e está documentada mas NÃO está integrada ao APEX.
    Gap: DynamicSkillForge só faz git_clone ou urllib_fetch — não usa Skills API.
    Benefício: skills de 8MB podem ser upadas e reutilizadas via API sem re-clone.

  when: >
    WHEN: DynamicSkillForge ativado E runtime == FULL_CLAUDE_CODE E ANTHROPIC_API_KEY disponível.
    WHEN: Skill solicitada tem skill_id no formato "anthropic:xlsx" ou "custom:skill_abc123".
    WHEN: Usuário solicita criação/publicação de nova skill.

  description: >
    O QUE É: Wrapper sobre Anthropic Skills API para CRUD de skills via HTTP.
    O QUE NÃO É: Substituição do git_clone — é caminho alternativo para skills API-managed.
    O QUE NÃO É: Disponível em MINIMAL runtime — requer ANTHROPIC_API_KEY.
    COMO FUNCIONA: DynamicSkillForge detecta skill_id com prefixo "anthropic:" ou "custom:"
    → usa Skills API em vez de git_clone → executa via container beta.
    LIMITE: 8 MB por skill (validado por validate_skill_directory()).
    BETA HEADERS: anthropic-beta: "code-execution-2025-08-25,files-api-2025-04-14,skills-2025-10-02"

  what_if_fails: >
    FALLBACK 1 — ANTHROPIC_API_KEY não disponível: usar git_clone se repo URL disponível.
    FALLBACK 2 — beta.skills API não acessível (non-beta account): declarar [SKILLS_API_UNAVAILABLE].
    FALLBACK 3 — skill > 8MB: ingerir apenas SKILL.md + arquivos <= 100KB.
    REGRA: Nunca bloquear pipeline por Skills API indisponível.

  inject_when: "DynamicSkillForge.load_skill() com skill_id prefixo anthropic:/custom:"
  depends_on: [dynamic_skill_forge, llm_runtime_adapter]

  api_methods:
    create_skill:
      endpoint: "POST /skills"
      beta_header: "skills-2025-10-02"
      input: "skill_path (dir com SKILL.md) + display_title"
      output: "{skill_id, latest_version, created_at}"
      apex_use: "Publicar skill gerada pelo PoT Engine para reutilização"

    list_skills:
      endpoint: "GET /skills?source=custom"
      output: "[{skill_id, display_title, latest_version}]"
      apex_use: "Verificar skills disponíveis antes de git_clone"

    retrieve_skill:
      endpoint: "GET /skills/{skill_id}"
      output: "{skill_id, name, description, directory, latest_version}"
      apex_use: "Verificar metadados antes de ativar"

    execute_via_container:
      method: "messages.create(container={skills: [{type, skill_id, version}]})"
      required_tools: ["code_execution_20250825"]
      apex_use: "Execução de skills Anthropic oficiais (xlsx, docx, pptx, pdf, canvas-design)"

    validate_skill:
      method: "validate_skill_directory(skill_path)"
      checks:
        - "SKILL.md presente com frontmatter name + description"
        - "frontmatter <= 1024 chars"
        - "Total directory size <= 8 MB"
      apex_use: "Antes de publicar skill gerada — SkillQualityBar (OPP-94) + este check"

  skill_id_format:
    anthropic_official: "anthropic:{skill_name}"  # ex: anthropic:xlsx
    custom:             "custom:{skill_uuid}"     # ex: custom:skill_abc123
    apex_internal:      "{domain}.{name}"         # formato APEX padrão

  python_implementation: |
    class SkillsAPIBridge:
        """Anthropic Skills API bridge para DynamicSkillForge."""

        BETA_HEADERS = {
            "anthropic-beta": "code-execution-2025-08-25,files-api-2025-04-14,skills-2025-10-02"
        }

        def __init__(self, api_key: str | None = None):
            self._available = False
            try:
                import anthropic
                self.client = anthropic.Anthropic(
                    api_key=api_key,
                    default_headers=self.BETA_HEADERS
                )
                self._available = True
            except (ImportError, Exception):
                pass  # FALLBACK: usar git_clone

        def load_skill(self, skill_id: str) -> dict:
            """Carrega skill via API. skill_id: "anthropic:xlsx" ou "custom:abc123"."""
            if not self._available:
                return {"error": "SKILLS_API_UNAVAILABLE", "fallback": "git_clone"}
            try:
                prefix, sid = skill_id.split(":", 1)
                skill = self.client.beta.skills.retrieve(sid)
                return {
                    "status": "LOADED_VIA_API",
                    "skill_id": skill_id,
                    "name": skill.name,
                    "description": skill.description,
                    "version": skill.latest_version
                }
            except Exception as e:
                return {"error": f"SKILLS_API_ERROR:{e}", "fallback": "git_clone"}

        def create_skill(self, skill_path: str, title: str) -> dict:
            """Cria nova skill via API a partir de diretório local."""
            if not self._available:
                return {"error": "SKILLS_API_UNAVAILABLE"}
            try:
                from anthropic.lib import files_from_dir
                skill = self.client.beta.skills.create(
                    files=files_from_dir(skill_path),
                    display_title=title
                )
                return {"skill_id": f"custom:{skill.skill_id}", "version": skill.latest_version}
            except Exception as e:
                return {"error": f"CREATE_FAILED:{e}"}

        def execute_with_skill(self, skill_ids: list[str], prompt: str,
                               model: str = "claude-opus-4-6") -> dict:
            """Executa skill via container beta."""
            if not self._available:
                return {"error": "SKILLS_API_UNAVAILABLE"}
            container_skills = [
                {"type": "anthropic" if s.startswith("anthropic:") else "custom",
                 "skill_id": s.split(":", 1)[1], "version": "latest"}
                for s in skill_ids
            ]
            response = self.client.beta.messages.create(
                model=model,
                max_tokens=4096,
                container={"skills": container_skills},
                tools=[{"type": "code_execution_20250825", "name": "code_execution"}],
                messages=[{"role": "user", "content": prompt}]
            )
            return {"status": "EXECUTED", "response": response}

  fmea:
    rpn: 8
    mode: "Skills API em beta — endpoints podem mudar ou ser descontinuados"
    probability: 2
    severity: 4
    detection: 1
    mitigation: >
      Fallback para git_clone sempre disponível.
      try/except em todos os calls à API.
      Version pinning: sempre usar latest (auto-migra).
      Declarar [SKILLS_API_BETA_USED] em todo output que usa esta via.

