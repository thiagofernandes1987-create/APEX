name: Build and Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string
      previous_tag:
        description: 'Previous release tag for changelog generation'
        required: false
        type: string
        default: ''

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build twine wheel
        shell: bash

      - name: Build wheel with bundled CLI
        run: python scripts/build_wheel.py --version "${{ inputs.version }}" --skip-sdist --clean
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update version files
        run: python scripts/update_version.py "$VERSION"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Verify all expected wheels are present
        run: |
          set -euo pipefail
          ls -la dist/
          expected=(
            "macosx_11_0_arm64"
            "macosx_11_0_x86_64"
            "manylinux_2_17_x86_64"
            "manylinux_2_17_aarch64"
            "win_amd64"
          )
          for tag in "${expected[@]}"; do
            if ! ls dist/*"${tag}".whl 2>/dev/null; then
              echo "::error::Missing wheel for platform tag: ${tag}"
              exit 1
            fi
          done
          echo "All ${#expected[@]} expected wheels present ✓"

      - name: Install build dependencies
        run: pip install build twine

      - name: Build sdist
        run: |
          python -m build --sdist --outdir sdist/
          ls -la sdist/

      - name: Pre-flight PyPI quota check
        run: |
          python3 - <<'EOF'
          import json
          import os
          import sys
          import urllib.request

          QUOTA_BYTES = 50 * 1024**3        # PyPI project quota (increased from default 10 GiB)
          THRESHOLD_BYTES = 47.5 * 1024**3  # Fail above 95% (2.5 GiB buffer)

          version = os.environ.get("VERSION", "")

          # Fetch current usage from PyPI JSON API
          try:
              with urllib.request.urlopen(
                  "https://pypi.org/pypi/claude-agent-sdk/json", timeout=30
              ) as r:
                  data = json.load(r)
          except Exception as exc:
              print(f"::warning::Could not fetch PyPI metadata: {exc}")
              print("Skipping quota pre-flight check.")
              sys.exit(0)

          current_total = sum(
              f["size"]
              for files in data["releases"].values()
              for f in files
          )

          # Collect filenames already uploaded for the current version so we
          # don't double-count them when summing local artifacts (re-run after
          # a partial upload).
          already_uploaded = set()
          if version and version in data["releases"]:
              already_uploaded = {f["filename"] for f in data["releases"][version]}

          # Sum local artifacts about to be uploaded, skipping already-uploaded files
          new_total = 0
          for d in ("dist", "sdist"):
              if os.path.isdir(d):
                  for fn in os.listdir(d):
                      if fn in already_uploaded:
                          print(f"  (skipping already-uploaded file: {fn})")
                          continue
                      new_total += os.path.getsize(os.path.join(d, fn))

          projected = current_total + new_total
          pct = 100.0 * current_total / QUOTA_BYTES
          projected_pct = 100.0 * projected / QUOTA_BYTES

          print(f"Current PyPI usage: {current_total / 1024**3:.3f} GiB / {QUOTA_BYTES / 1024**3:.0f} GiB ({pct:.1f}%)")
          print(f"New upload size:    {new_total / 1024**2:.2f} MiB")
          print(f"Projected usage:    {projected / 1024**3:.3f} GiB / {QUOTA_BYTES / 1024**3:.0f} GiB ({projected_pct:.1f}%)")

          if projected > THRESHOLD_BYTES:
              print(
                  f"::error::Projected PyPI usage {projected / 1024**3:.3f} GiB exceeds "
                  f"{THRESHOLD_BYTES / 1024**3:.1f} GiB safety threshold. Delete old releases or "
                  f"request a further quota increase at https://pypi.org/help/#project-size-limit "
                  f"before publishing."
              )
              sys.exit(1)
          EOF

      - name: Publish to PyPI (sdist first, then wheels)
        # Upload the tiny sdist first so `pip install` has a universal fallback
        # even if wheel uploads fail partway. --skip-existing makes re-runs
        # safe after a partial upload (PyPI rejects re-uploads of identical
        # filenames, which would otherwise abort the whole job).
        run: |
          twine upload --skip-existing sdist/*.tar.gz
          twine upload --skip-existing dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Commit version changes
        run: |
          git add pyproject.toml src/claude_agent_sdk/_version.py
          git commit -m "chore: release v$VERSION"

      - name: Update changelog with Claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "/generate-changelog new version: ${{ env.VERSION }}, old version: ${{ inputs.previous_tag }}"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools 'Bash(git add:*),Bash(git commit:*),Edit'

      - name: Push to main
        run: |
          git remote set-url origin git@github.com:anthropics/claude-agent-sdk-python.git
          git push origin main

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

          awk -v ver="$VERSION" '/^## / { if (found) exit; if ($2 == ver) found=1; next } found { print }' CHANGELOG.md > release_notes.md
          echo -e "\n---\n\n**PyPI:** https://pypi.org/project/claude-agent-sdk/$VERSION/\n\n\`\`\`bash\npip install claude-agent-sdk==$VERSION\n\`\`\`" >> release_notes.md

          gh release create "v$VERSION" --title "v$VERSION" --notes-file release_notes.md
