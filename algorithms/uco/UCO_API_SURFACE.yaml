non_existent_methods:
  # WHY: LLMs alucinam esses métodos. Documentado aqui para prevenir reincidência.
  - name: "gate()"
    hallucinated_by: "DeepSeek (2026-04-10)"
    fake_usage: "uco.gate(html_template, cognitive_mode='SCIENTIFIC')"
    correct_alternative: "uco.analyze(html_template)  # verificar result['score'] >= threshold"

  - name: "validate()"
    hallucinated_by: "[não confirmado — preventivo]"
    correct_alternative: "uco.analyze(code)"

  - name: "check()"
    hallucinated_by: "[não confirmado — preventivo]"
    correct_alternative: "uco.analyze(code)"

  - name: "run()"
    hallucinated_by: "[não confirmado — preventivo]"
    correct_alternative: "uco.analyze(code) ou uco.quick_optimize(code)"

# ═══════════════════════════════════════════════════════
# PADRÃO CORRETO DE UCO GATE
# ═══════════════════════════════════════════════════════

uco_gate_pattern:
  # WHY: Substituir o padrão alucinado uco.gate() pelo padrão real correto.
  wrong: |
    # ERRADO — gate() não existe
    gate_decision = uco.gate(code, cognitive_mode="SCIENTIFIC")
    print(gate_decision['decision'])

  correct: |
    # CORRETO — usar analyze() e verificar score manualmente
    uco = UniversalCodeOptimizer()
    result = uco.analyze(code)

    THRESHOLDS = {"EXPRESS": 40, "FAST": 55, "DEEP": 70, "SCIENTIFIC": 85}
    threshold = THRESHOLDS.get(cognitive_mode, 60)

    gate_pass = result['score'] >= threshold and result['bugs'] < 0.1
    decision = "PASS" if gate_pass else "FAIL"

    print(f"[UCO_GATE: H={result['H']:.1f} | score={result['score']} | bugs={result['bugs']:.3f} | {decision}]")

availability_by_runtime:
  claude_full:
    analyze: true
    quick_optimize: true
    optimize_fast: true
    optimize: true        # numpy disponível
  gpt4o_partial:
    analyze: true
    quick_optimize: true
    optimize_fast: true
    optimize: true        # numpy disponível no Code Interpreter
  gemini_partial:
    analyze: true
    quick_optimize: true
    optimize_fast: true
    optimize: false       # verificar numpy
  deepseek_partial:
    analyze: true         # usar @Sandbox @Numpy
    quick_optimize: true  # usar @Sandbox
    optimize_fast: true   # usar @Sandbox
    optimize: true        # usar @Sandbox @Numpy
  llama_minimal:
    analyze: false        # descrever analiticamente
    quick_optimize: false
    optimize_fast: false
    optimize: false
